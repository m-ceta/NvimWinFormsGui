<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
        }

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg);
        }

        #root {
            position: fixed;
            inset: 0;
            background: var(--bg);
        }

        canvas {
            position: absolute;
            inset: 0;
            display: block;
        }

        #booterr {
            position: fixed;
            inset: 0;
            padding: 12px;
            font: 14px/1.4 monospace;
            color: #fff;
            background: #300;
            display: none;
            white-space: pre-wrap;
        }

        #tabline {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            display: none;
            min-height: 1.9em;
            padding: 2px 6px;
            background: color-mix(in srgb, var(--bg) 88%, #ffffff 12%);
            color: var(--fg);
            font: 14px/1 monospace;
            z-index: 30;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            white-space: nowrap;
            overflow: hidden;
        }

        .tabitem {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 3px 8px;
            margin-right: 4px;
            border-radius: 4px 4px 0 0;
            background: rgba(255, 255, 255, 0.08);
            cursor: default;
        }

        .tabitem.current {
            background: rgba(255, 255, 255, 0.2);
            font-weight: 700;
        }

        .tabicon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.6em;
            padding: 0 0.35em;
            border-radius: 999px;
            font-size: 0.82em;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0.85;
        }

        .tabclose {
            border: 0;
            background: transparent;
            color: inherit;
            padding: 0 2px;
            font: inherit;
            line-height: 1;
            opacity: 0.7;
            cursor: pointer;
        }

        .tabclose:hover {
            opacity: 1;
        }

        .tabitem.modified::after {
            content: " +";
        }


        #messages {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            padding: 0 8px;
            font: 14px/1 monospace;
            color: var(--fg);
            background: transparent;
            pointer-events: none;
            z-index: 20;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            box-sizing: border-box;
            max-width: none;
        }

        #messages:empty {
            display: none;
        }

        #popupmenu {
            position: fixed;
            display: none;
            min-width: 12ch;
            max-width: min(72ch, 90vw);
            max-height: min(18em, 55vh);
            overflow-x: hidden;
            overflow-y: auto;
            background: color-mix(in srgb, var(--bg) 94%, #ffffff 6%);
            color: var(--fg);
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
            font: 14px/1 monospace;
            z-index: 40;
            box-sizing: border-box;
            border-radius: 6px;
            scrollbar-width: thin;
            scrollbar-color: var(--pum-thumb, rgba(255, 255, 255, 0.28)) var(--pum-sbar, rgba(255, 255, 255, 0.08));
        }

        #popupmenu::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        #popupmenu::-webkit-scrollbar-track {
            background: var(--pum-sbar, rgba(255, 255, 255, 0.08));
        }

        #popupmenu::-webkit-scrollbar-thumb {
            background: var(--pum-thumb, rgba(255, 255, 255, 0.28));
            border-radius: 999px;
            border: 2px solid var(--pum-sbar, rgba(255, 255, 255, 0.08));
        }

        .pumitem {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            column-gap: 1ch;
            padding: 2px 8px;
            white-space: pre;
        }

        .pumitem.selected {
            background: rgba(255, 255, 255, 0.18);
        }

        .pum-kind,
        .pum-extra {
            opacity: 0.75;
        }

        .msgline {
            display: block;
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg);
            white-space: break-spaces;
            overflow-wrap: anywhere;
            word-break: break-all;
            box-sizing: border-box;
            border-radius: 0;
        }

        .msgline.msgstatus {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) max-content;
            align-items: center;
            gap: 1ch;
            white-space: pre;
            overflow: hidden;
            overflow-wrap: normal;
            word-break: normal;
        }

        .msgstatus-left {
            min-width: 0;
            overflow: hidden;
            text-overflow: clip;
        }

        .msgstatus-mid {
            min-width: 0;
            overflow: hidden;
            text-align: right;
            text-overflow: clip;
        }

        .msgstatus-right {
            min-width: 0;
            overflow: hidden;
            text-align: right;
            text-overflow: clip;
        }

        .msgline.msg-normal {
            background: color-mix(in srgb, var(--bg) 92%, #ffffff 8%);
        }

        .msgline.msg-warning {
            background: color-mix(in srgb, var(--bg) 78%, #7a5200 22%);
            color: #ffe39a;
        }

        .msgline.msg-error {
            background: color-mix(in srgb, var(--bg) 72%, #7a1f1f 28%);
            color: #ffdada;
        }

        .msgline.msg-history {
            background: color-mix(in srgb, var(--bg) 90%, #ffffff 10%);
        }

        .msgchunk {
            display: inline;
            white-space: break-spaces;
        }

        .msgcode.error {
            color: #ffffff;
            background: #8f2d2d;
        }

        #cmdblock,
        #cmdline {
            position: fixed;
            left: 0;
            right: 0;
            padding: 0 8px;
            font: 14px/1 monospace;
            color: var(--fg);
            background: var(--bg);
            pointer-events: none;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            z-index: 25;
            box-sizing: border-box;
        }

        #cmdblock {
            bottom: 2.4em;
            display: none;
            max-height: 40vh;
            overflow-x: hidden;
            overflow-y: hidden;
        }

        #cmdline {
            bottom: 0;
            display: none;
            white-space: pre;
            overflow-x: hidden;
            overflow-y: hidden;
        }

        .cmdline-cursor {
            background: var(--fg);
            color: var(--bg);
        }

        #ime {
            position: absolute;
            left: 0;
            top: 0;
            width: 24px;
            height: 20px;
            opacity: 0.01;
            border: 0;
            padding: 0;
            margin: 0;
            background: transparent;
            color: transparent;
            caret-color: transparent;
            outline: none;
            resize: none;
            overflow: hidden;
            white-space: nowrap;
            z-index: 10;
        }

        #ime.composing {
            opacity: 1;
            color: var(--fg);
            caret-color: var(--fg);
            background: transparent;
        }
    </style>
</head>
<body>
    <div id="tabline"></div>
    <div id="root"><textarea id="ime" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea><canvas id="cv"></canvas></div>
    <div id="booterr"></div>
    <div id="messages"></div>
    <div id="cmdblock"></div>
    <div id="cmdline"></div>
    <div id="popupmenu"></div>

    <script>
        (() => {
            const root = document.getElementById("root");
            const cv = document.getElementById("cv");
            const errEl = document.getElementById("booterr");
            const ime = document.getElementById("ime");
            const tablineEl = document.getElementById("tabline");
            const messagesEl = document.getElementById("messages");
            const cmdblockEl = document.getElementById("cmdblock");
            const cmdlineEl = document.getElementById("cmdline");
            const popupmenuEl = document.getElementById("popupmenu");

            let composing = false;
            let suppressNextInputText = null;
            let mouseLeftDown = false;
            let activeMouseTarget = null;
            let redrawKickTimer = 0;

            function showErr(msg) {
                errEl.style.display = "block";
                errEl.textContent = msg;
            }

            if (!window.chrome || !window.chrome.webview) {
                showErr("WebView2 webview bridge が見つかりません。WebView2 の初期化が完了しているか確認してください。");
                return;
            }

            const ctx = cv.getContext("2d", { alpha: false });
            if (!ctx) {
                showErr("Canvas 2D context が null です。");
                return;
            }

            const post = (obj) => window.chrome.webview.postMessage(JSON.stringify(obj));
            let uiDebugEnabled = false;
            const debugEventNameMap = {
                popupmenu_show: "pum_show",
                popupmenu_select: "pum_select",
                popupmenu_hide: "pum_hide"
            };
            const debugEventAllowList = new Set([
                "option_set",
                "hl_attr_define",
                "grid_resize",
                "grid_line",
                "grid_clear",
                "grid_scroll",
                "win_pos",
                "win_float_pos",
                "win_hide",
                "win_close",
                "pum_show",
                "pum_select",
                "pum_hide",
                "cmdline_show",
                "cmdline_hide",
                "msg_show",
                "msg_clear",
                "flush"
            ]);

            function setUiDebugEnabled(enabled) {
                uiDebugEnabled = !!enabled;
                if (uiDebugEnabled) {
                    console.debug("[nvim-ui] redraw debug enabled");
                }
            }

            function truncateDebugText(value, max = 48) {
                const text = String(value ?? "").replace(/\r/g, "\\r").replace(/\n/g, "\\n");
                return text.length <= max ? text : `${text.slice(0, max)}...`;
            }

            function summarizeDebugPayload(name, payload) {
                const p = payload && typeof payload === "object" ? payload : {};
                switch (name) {
                    case "option_set":
                        return `name=${p.name ?? ""} value=${truncateDebugText(p.value ?? "")}`;
                    case "hl_attr_define":
                        return `id=${p.id ?? 0}`;
                    case "grid_resize":
                        return `grid=${p.gridId ?? 0} size=${p.cols ?? 0}x${p.rows ?? 0}`;
                    case "grid_line":
                        return `grid=${p.gridId ?? 0} row=${p.row ?? 0} col=${p.colStart ?? 0} runs=${p.cellRuns ?? 0} cells=${p.cellCount ?? 0}`;
                    case "grid_clear":
                        return `grid=${p.gridId ?? 0}`;
                    case "grid_scroll":
                        return `grid=${p.gridId ?? 0} top=${p.top ?? 0} bot=${p.bot ?? 0} left=${p.left ?? 0} right=${p.right ?? 0} rowsDelta=${p.rowsDelta ?? 0} colsDelta=${p.colsDelta ?? 0}`;
                    case "win_pos":
                        return `grid=${p.gridId ?? 0} row=${p.winrow ?? 0} col=${p.wincol ?? 0} size=${p.width ?? 0}x${p.height ?? 0}`;
                    case "win_float_pos":
                        return `grid=${p.gridId ?? 0} anchor=${p.anchor ?? ""} anchorGrid=${p.anchorGrid ?? 0} row=${p.anchorRow ?? 0} col=${p.anchorCol ?? 0} z=${p.zindex ?? 0}`;
                    case "win_hide":
                    case "win_close":
                        return `grid=${p.gridId ?? 0}`;
                    case "pum_show":
                        return `selected=${p.selected ?? -1} row=${p.row ?? 0} col=${p.col ?? 0} grid=${p.grid ?? 0} items=${p.items ?? 0}`;
                    case "pum_select":
                        return `selected=${p.selected ?? -1}`;
                    case "pum_hide":
                        return "hidden";
                    case "cmdline_show":
                        return `level=${p.level ?? 0} text=${truncateDebugText(p.text ?? "")}`;
                    case "cmdline_hide":
                        return `level=${p.level ?? 0}`;
                    case "msg_show":
                        return `kind=${p.kind ?? ""} replace=${!!p.replaceLast} append=${!!p.append} text=${truncateDebugText(p.text ?? "")}`;
                    case "msg_clear":
                        return "cleared";
                    case "flush":
                        return `paint=${!!p.paint}`;
                    default:
                        return truncateDebugText(JSON.stringify(p));
                }
            }

            // --- font / cell metrics ---
            let fontFamily = "Consolas, monospace";
            let fontSize = 14;
            let lineHeight = 1.1;
            let cellW = 8, cellH = 16;
            let dpr = 1;
            let fontAscent = 11;
            let fontDescent = 3;
            let textYOffset = 0;

            function applyGuiFont(value) {
                if (!value) return;

                let s = String(value);

                // Vim/Neovim の guifont は space が \ か _ で表現されることがある
                s = s.replace(/\\ /g, " ").replace(/_/g, " ");

                // 例: "AdwaitaMono Nerd Font Mono:h11"
                const parts = s.split(":");
                const family = (parts[0] || "").trim();
                let size = fontSize;

                for (let i = 1; i < parts.length; i++) {
                    const p = parts[i].trim();
                    const m = /^h(\d+(?:\.\d+)?)$/i.exec(p);
                    if (m) {
                        const parsed = parseFloat(m[1]);
                        if (!Number.isNaN(parsed) && parsed > 0) size = parsed;
                    }
                }

                if (family) {
                    fontFamily = `"${family}", monospace`;
                }
                fontSize = size;

                updateMetrics();

                const cr = calcColsRows();
                if (cr.cols !== cols || cr.rows !== rows) {
                    allocGrid(cr.cols, cr.rows, 1);
                    post({ type: "resize", cols: cr.cols, rows: cr.rows });
                }

                syncImePosition();
                markAllDirty();
                schedulePaint();
            }

            function updateMetrics() {
                dpr = window.devicePixelRatio || 1;
                const w = root.clientWidth;
                const h = root.clientHeight;

                cv.width = Math.max(1, Math.floor(w * dpr));
                cv.height = Math.max(1, Math.floor(h * dpr));
                cv.style.width = w + "px";
                cv.style.height = h + "px";

                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.font = `${fontSize}px ${fontFamily}`;
                ctx.textBaseline = "alphabetic";

                const m = ctx.measureText("Mg");
                cellW = Math.max(4, Math.ceil(ctx.measureText("M").width));
                cellH = Math.max(8, Math.ceil(fontSize * lineHeight));

                fontAscent = Math.ceil(m.actualBoundingBoxAscent || fontSize * 0.8);
                fontDescent = Math.ceil(m.actualBoundingBoxDescent || fontSize * 0.2);

                const textH = fontAscent + fontDescent;
                textYOffset = Math.round((cellH - textH) / 2) + fontAscent + 1;

                const overlayFont = `${fontSize}px/${Math.max(1, cellH)}px ${fontFamily}`;
                if (messagesEl) messagesEl.style.font = overlayFont;
                if (cmdblockEl) cmdblockEl.style.font = overlayFont;
                if (cmdlineEl) cmdlineEl.style.font = overlayFont;
                if (popupmenuEl) popupmenuEl.style.font = overlayFont;
                updateAllGridPlacements();
            }

            function calcColsRows() {
                const w = root.clientWidth;
                const h = root.clientHeight;
                const cols = Math.max(10, Math.floor(w / cellW));
                const rows = Math.max(5, Math.floor(h / cellH));
                return { cols, rows };
            }

            // --- highlight state ---
            const hl = new Map(); // id -> resolved highlight attrs
            let defFg = "#ffffff";
            let defBg = "#000000";

            function rgbIntToHex(n) {
                if (typeof n !== "number") return null;
                if (n < 0) return null;
                const s = (n >>> 0).toString(16).padStart(6, "0");
                return "#" + s;
            }

            function toBlend(value) {
                const n = Number(value);
                if (!Number.isFinite(n)) return 0;
                return Math.max(0, Math.min(100, Math.round(n)));
            }

            // --- grid state ---
            let cols = 80, rows = 24;
            let grid = [];
            let cursor = { grid: 1, r: 0, c: 0 };
            let modeInfos = [];
            let currentModeName = "normal";
            let currentCursorShape = "block"; // block | vertical | horizontal
            let currentCellPercentage = 25;   // ver25 / hor20 など
            let gotAnyRedraw = false;
            let dirtyRows = null;
            let cursorVisible = true;
            let deferredPaintNeeded = false;
            const floatShadowEnabled = false;
            const uiHlGroups = new Map();

            const grids = new Map(); // id -> { id, cols, rows, cells, dirtyRows, x, y, z, visible, floating }

            function makeGridState(id, newCols, newRows) {
                const cells = new Array(newRows);
                const dr = new Uint8Array(newRows);
                dr.fill(1);

                for (let r = 0; r < newRows; r++) {
                    const row = new Array(newCols);
                    for (let c = 0; c < newCols; c++) {
                        row[c] = { ch: " ", hl: 0, cont: false };
                    }
                    cells[r] = row;
                }

                return {
                    id,
                    winId: null,
                    cols: newCols,
                    rows: newRows,
                    outerCols: newCols,
                    outerRows: newRows,
                    cells,
                    dirtyRows: dr,
                    x: 0,
                    y: 0,
                    z: id === 1 ? 0 : 100 + id,
                    baseZ: id === 1 ? 0 : 100 + id,
                    visible: true,
                    floating: false,
                    anchor: "NW",
                    anchorGrid: 1,
                    anchorRow: 0,
                    anchorCol: 0,
                    focusable: false,
                    zindex: 50,
                    compIndex: 0,
                    screenRow: Number.NaN,
                    screenCol: Number.NaN,
                    relative: "editor",
                    viewport: null,
                    viewportMargins: { top: 0, bottom: 0, left: 0, right: 0 }
                };
            }

            function applyAnchorOffset(baseX, baseY, anchor, widthCols, heightRows) {
                let x = baseX;
                let y = baseY;
                const a = String(anchor || "NW");
                if (a.includes("S")) y -= heightRows * cellH;
                if (a.includes("E")) x -= widthCols * cellW;
                return { x, y };
            }

            function updateGridPlacement(gs) {
                if (!gs) return;

                const widthCols = Math.max(0, Math.min(gs.cols || 0, gs.outerCols || gs.cols || 0));
                const heightRows = Math.max(0, Math.min(gs.rows || 0, gs.outerRows || gs.rows || 0));

                if (gs.floating) {
                    let x = 0;
                    let y = 0;
                    if (Number.isFinite(gs.screenRow) && Number.isFinite(gs.screenCol)) {
                        x = gs.screenCol * cellW;
                        y = gs.screenRow * cellH;
                    } else {
                        const anchorGridState = getGridState(gs.anchorGrid || 1);
                        const anchorBaseX = (anchorGridState?.x || 0) + (Number(gs.anchorCol) || 0) * cellW;
                        const anchorBaseY = (anchorGridState?.y || 0) + (Number(gs.anchorRow) || 0) * cellH;
                        const offset = applyAnchorOffset(anchorBaseX, anchorBaseY, gs.anchor, widthCols || gs.cols || 0, heightRows || gs.rows || 0);
                        x = offset.x;
                        y = offset.y;
                    }

                    gs.x = x;
                    gs.y = y;
                    gs.z = 1000 + (Number(gs.zindex) || 0) + (Number(gs.compIndex) || 0);
                } else {
                    gs.x = (Number(gs.winCol) || 0) * cellW;
                    gs.y = (Number(gs.winRow) || 0) * cellH;
                    gs.z = gs.id === 1 ? 0 : (Number(gs.baseZ) || (100 + gs.id));
                }
            }

            function updateAllGridPlacements() {
                for (const gs of grids.values()) {
                    updateGridPlacement(gs);
                }
            }

            function getGridState(id, create = false) {
                let gs = grids.get(id);
                if (!gs && create) {
                    gs = makeGridState(id, id === 1 ? cols : 1, id === 1 ? rows : 1);
                    grids.set(id, gs);
                }
                return gs || null;
            }

            function markDirtyRow(r, gridId = 1) {
                const gs = getGridState(gridId);
                if (!gs || !gs.dirtyRows) return;
                if (r >= 0 && r < gs.dirtyRows.length) gs.dirtyRows[r] = 1;
                if (gridId === 1) dirtyRows = gs.dirtyRows;
            }

            function markAllDirty(gridId = null) {
                if (gridId == null) {
                    for (const gs of grids.values()) {
                        if (gs.dirtyRows) gs.dirtyRows.fill(1);
                    }
                    if (grids.has(1)) dirtyRows = grids.get(1).dirtyRows;
                    return;
                }

                const gs = getGridState(gridId);
                if (!gs || !gs.dirtyRows) return;
                gs.dirtyRows.fill(1);
                if (gridId === 1) dirtyRows = gs.dirtyRows;
            }

            function allocGrid(newCols, newRows, gridId = 1) {
                const prev = getGridState(gridId);
                const gs = makeGridState(gridId, newCols, newRows);
                if (prev) {
                    const copyRows = Math.min(prev.rows || 0, newRows);
                    const copyCols = Math.min(prev.cols || 0, newCols);
                    for (let r = 0; r < copyRows; r++) {
                        for (let c = 0; c < copyCols; c++) {
                            const src = prev.cells?.[r]?.[c];
                            if (!src) continue;
                            gs.cells[r][c] = {
                                ch: src.ch || " ",
                                hl: src.hl || 0,
                                cont: !!src.cont
                            };
                        }
                    }
                    if (gs.dirtyRows) gs.dirtyRows.fill(1);
                    gs.x = prev.x || 0;
                    gs.y = prev.y || 0;
                    gs.z = prev.z || gs.z;
                    gs.baseZ = prev.baseZ || gs.baseZ;
                    gs.winId = prev.winId ?? null;
                    gs.winRow = prev.winRow;
                    gs.winCol = prev.winCol;
                    gs.visible = prev.visible !== false;
                    gs.floating = !!prev.floating;
                    gs.anchor = prev.anchor || "NW";
                    gs.anchorGrid = prev.anchorGrid || 1;
                    gs.anchorRow = prev.anchorRow || 0;
                    gs.anchorCol = prev.anchorCol || 0;
                    gs.focusable = !!prev.focusable;
                    gs.zindex = prev.zindex || 50;
                    gs.compIndex = prev.compIndex || 0;
                    gs.screenRow = prev.screenRow;
                    gs.screenCol = prev.screenCol;
                    gs.relative = prev.relative || "editor";
                    gs.viewport = prev.viewport || null;
                    gs.viewportMargins = prev.viewportMargins || { top: 0, bottom: 0, left: 0, right: 0 };
                    if (prev.floating) {
                        gs.outerCols = prev.outerCols;
                        gs.outerRows = prev.outerRows;
                    }
                }
                if (gridId === 1) {
                    cols = newCols;
                    rows = newRows;
                    grid = gs.cells;
                    dirtyRows = gs.dirtyRows;
                }
                grids.set(gridId, gs);
            }

            function clearGrid(gridId = 1) {
                const gs = getGridState(gridId);
                if (!gs) return;

                for (let r = 0; r < gs.rows; r++) {
                    for (let c = 0; c < gs.cols; c++) {
                        gs.cells[r][c].ch = " ";
                        gs.cells[r][c].hl = 0;
                        gs.cells[r][c].cont = false;
                    }
                }
                markAllDirty(gridId);
            }

            function eachVisibleGridInPaintOrder() {
                return [...grids.values()]
                    .filter(g => g.id !== msgGridId)
                    .filter(g => g.id === 1 || g.visible !== false)
                    .sort((a, b) => {
                        const z = (a.z || 0) - (b.z || 0);
                        if (z !== 0) return z;
                        if (!!a.floating !== !!b.floating) return a.floating ? 1 : -1;
                        return (a.id || 0) - (b.id || 0);
                    });
            }

            function isOverlayManagedFloat(gs) {
                if (!gs || !gs.floating || !gs.focusable) return false;
                const screenRow = Number(gs.screenRow);
                const rowsCount = Math.max(0, gs.rows || 0);
                const colsCount = Math.max(0, gs.cols || 0);
                if (Number.isFinite(screenRow) && screenRow >= Math.max(0, rows - 4)) {
                    return true;
                }
                if (rowsCount > 2) return false;
                return Number.isFinite(screenRow)
                    && screenRow >= Math.max(0, rows - 6)
                    && colsCount >= Math.max(20, Math.floor(cols * 0.45));
            }

            function shouldHideAsOverlayCompanion(gs) {
                if (!gs || gs.overlayManaged || !gs.floating || gs.focusable) return false;
                const row = Number(gs.screenRow);
                const col = Number(gs.screenCol);
                if (!Number.isFinite(row) || !Number.isFinite(col)) return false;

                for (const other of grids.values()) {
                    if (!other || !other.overlayManaged) continue;
                    const otherRow = Number(other.screenRow);
                    const otherCol = Number(other.screenCol);
                    if (!Number.isFinite(otherRow) || !Number.isFinite(otherCol)) continue;
                    if (otherRow !== row) continue;

                    const otherEndCol = otherCol + Math.max(0, other.cols || 0);
                    const rowOverlap = Math.min(gs.rows || 0, other.rows || 0);
                    if (rowOverlap <= 0) continue;

                    if (col >= otherCol - 1 && col <= otherEndCol + 1) {
                        return true;
                    }
                }

                return false;
            }

            function shouldHideAsLowProfileFooterFloat(gs) {
                if (!gs || !gs.floating) return false;
                const row = Number(gs.screenRow);
                if (!Number.isFinite(row) || row < Math.floor(rows * 0.5)) return false;
                const rowsCount = Math.max(0, gs.rows || 0);
                const colsCount = Math.max(0, gs.cols || 0);

                if (gs.focusable) {
                    return rowsCount <= 2 && colsCount >= 12;
                }

                return colsCount <= 2 && rowsCount <= 12;
            }

            function shouldHideAsShowmodeFloat(gs) {
                if (!gs || !gs.floating || gs.focusable) return false;
                if (!msgShowmode) return false;
                const row = Number(gs.screenRow);
                if (!Number.isFinite(row) || row > 1) return false;
                const colsCount = Math.max(0, gs.cols || 0);
                const rowsCount = Math.max(0, gs.rows || 0);
                if (rowsCount > 8) return false;
                return colsCount <= 30 || colsCount === 1;
            }

            function shouldDebugFloatGridLine(gs, text) {
                if (!gs || !gs.floating) return false;
                const value = String(text ?? "");
                if (!value.trim()) return false;
                if (/\b(def|class|async|return|function|lambda|self|None|True|False)\b/.test(value)) return true;
                const rowsCount = Math.max(0, gs.rows || 0);
                const colsCount = Math.max(0, gs.cols || 0);
                return rowsCount > 1 && colsCount > 8 && value.length >= 3;
            }

            // --- messages ---
            let msgShowmode = "";
            let msgShowcmd = "";
            let msgRuler = "";
            let messageLines = [];
            const cmdlines = new Map();
            let cmdlineBlock = [];
            let msgGridRow = null;
            let msgGridVisible = false;
            let msgGridId = null;
            let historyLines = [];
            let transientMessageTimer = 0;
            let historyMessageTimer = 0;
            let tablineTopInset = 0;
            let popupmenuState = null;
            let lastPopupBoundsKey = "";

            function escapeHtml(text) {
                return String(text ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            function stableKey(value) {
                if (value == null) return "";
                if (typeof value === "string" || typeof value === "number" || typeof value === "boolean") {
                    return String(value);
                }
                try {
                    return JSON.stringify(value);
                } catch {
                    return String(value);
                }
            }

            function tabBadge(label) {
                const text = String(label || "").trim();
                if (!text) return "tab";
                const lower = text.toLowerCase();
                if (lower.endsWith("/") || lower.endsWith("\\")) return "dir";
                const parts = lower.split(/[\\/]/);
                const name = parts[parts.length - 1];
                const dot = name.lastIndexOf(".");
                if (dot > 0 && dot < name.length - 1) {
                    return name.slice(dot + 1, Math.min(name.length, dot + 4));
                }
                return name.slice(0, Math.min(3, name.length));
            }

            function tabDisplayLabel(label) {
                const text = String(label || "").trim();
                if (text.length <= 20) return text;
                return `...${text.slice(-20)}`;
            }

            function chunksToText(chunks) {
                if (!Array.isArray(chunks)) return String(chunks ?? "");
                let s = "";
                for (const ch of chunks) {
                    const a = normalizeArg(ch);
                    if (a.length >= 2) s += String(a[1] ?? "");
                    else s += String(a[0] ?? "");
                }
                return s;
            }

            function isSwapfileConfirmText(text) {
                const value = String(text ?? "");
                return value.includes("Found a swap file by the name")
                    || (value.includes("Swap file") && value.includes("already exists!"));
            }

            function normalizeConfirmLayout(text) {
                const lines = String(text ?? "").split("\n");
                if (lines.length >= 3 && /^Found a swap file by the name\b/.test(lines[1] || "")) {
                    let datedText = "";
                    const explicitDatedIndex = lines.findIndex((line, index) => index > 1 && /^\s*dated:\s*/i.test(String(line ?? "")));
                    if (explicitDatedIndex >= 0) {
                        datedText = String(lines[explicitDatedIndex] ?? "").trim();
                        lines.splice(explicitDatedIndex, 1);
                    } else {
                        const datedLine = String(lines[2] ?? "").trim();
                        if (datedLine && !datedLine.includes(":") && /\d{4}\b/.test(datedLine)) {
                            datedText = `dated: ${datedLine}`;
                            lines.splice(2, 1);
                        }
                    }
                    if (datedText) {
                        lines[0] = `${String(lines[0] ?? "").trimEnd()}  ${datedText}`;
                    }
                }
                return lines.join("\n");
            }

            function normalizeMessageContent(kind, content) {
                const text = String(content ?? "");
                if (kind === "confirm" && isSwapfileConfirmText(text)) {
                    const withHeader = /^E325: ATTENTION\b/m.test(text) ? text : `E325: ATTENTION\n${text}`;
                    return normalizeConfirmLayout(withHeader);
                }
                return text;
            }

            function normalizeMessageChunks(chunks, kind) {
                const text = normalizeMessageContent(kind, chunksToText(chunks));
                if (!Array.isArray(chunks) || chunks.length === 0) {
                    return [{ text, hlId: 0 }];
                }

                const normalized = [];
                for (const chunk of chunks) {
                    const a = normalizeArg(chunk);
                    let hlId = 0;
                    let piece = "";
                    if (a.length >= 2) {
                        hlId = Number(a[0] ?? 0);
                        piece = String(a[1] ?? "");
                    } else {
                        piece = String(a[0] ?? "");
                    }
                    if (!piece) continue;
                    normalized.push({ text: piece, hlId });
                }

                if (normalized.length === 0) {
                    return [{ text, hlId: 0 }];
                }

                const joined = normalized.map(part => part.text).join("");
                if (joined === text) return normalized;
                return [{ text, hlId: 0 }];
            }

            function kindToMessageClass(kind, history = false) {
                if (history) return "msg-history";
                const value = String(kind || "").toLowerCase();
                if (value === "emsg" || value === "echoerr" || value === "error") return "msg-error";
                if (value === "wmsg" || value === "warningmsg" || value === "search_count") return "msg-warning";
                return "msg-normal";
            }

            function messageChunkStyle(hlId) {
                const attrs = getHighlightAttrs(hlId);
                const styles = [];
                if (attrs.fg && attrs.fg !== defFg) styles.push(`color:${attrs.fg}`);
                if (attrs.bg && attrs.bg !== defBg) styles.push(`background:${blendBackgroundColor(attrs.bg, attrs, defBg)}`);
                if (attrs.bold) styles.push("font-weight:bold");
                if (attrs.italic) styles.push("font-style:italic");
                const decorations = [];
                if (attrs.underline || attrs.undercurl || attrs.underdouble || attrs.underdotted || attrs.underdashed) {
                    decorations.push("underline");
                }
                if (attrs.strikethrough) {
                    decorations.push("line-through");
                }
                if (decorations.length > 0) {
                    styles.push(`text-decoration:${decorations.join(" ")}`);
                }
                return styles.join(";");
            }

            function createMessageLineElement(entry, history = false) {
                const div = document.createElement("div");
                const kindClass = kindToMessageClass(entry?.kind, history);
                div.className = `msgline ${kindClass}`;

                const chunks = Array.isArray(entry?.chunks) && entry.chunks.length > 0
                    ? entry.chunks
                    : [{ text: entry?.text || "", hlId: 0 }];
                const fullText = chunks.map(chunk => String(chunk?.text ?? "")).join("");
                const attentionHeader = "E325: ATTENTION";
                if (entry?.kind === "confirm") {
                    const confirmText = String(entry?.text || fullText || "");
                    if (confirmText.startsWith(attentionHeader)) {
                        const code = document.createElement("span");
                        code.className = "msgcode error";
                        code.textContent = attentionHeader;
                        div.appendChild(code);
                        const remainder = confirmText.slice(attentionHeader.length);
                        if (remainder) div.appendChild(document.createTextNode(remainder));
                    } else {
                        div.textContent = confirmText;
                    }
                    return div;
                }
                if (fullText.startsWith(attentionHeader)) {
                    const code = document.createElement("span");
                    code.className = "msgcode error";
                    code.textContent = attentionHeader;
                    div.appendChild(code);
                    const remainder = fullText.slice(attentionHeader.length);
                    if (remainder) div.appendChild(document.createTextNode(remainder));
                    return div;
                }

                for (const chunk of chunks) {
                    const span = document.createElement("span");
                    span.className = "msgchunk";
                    span.textContent = String(chunk?.text ?? "");
                    const style = messageChunkStyle(Number(chunk?.hlId ?? 0));
                    if (style) span.style.cssText = style;
                    div.appendChild(span);
                }

                return div;
            }

            function hasConfirmMessages() {
                return messageLines.some(line => line && typeof line === "object" && line.kind === "confirm");
            }

            function clearTransientMessageTimer() {
                if (transientMessageTimer) {
                    clearTimeout(transientMessageTimer);
                    transientMessageTimer = 0;
                }
            }

            function clearHistoryMessageTimer() {
                if (historyMessageTimer) {
                    clearTimeout(historyMessageTimer);
                    historyMessageTimer = 0;
                }
            }

            function clearTransientMessages() {
                const nextLines = messageLines.filter(line => !(line && typeof line === "object" && line.transient));
                if (nextLines.length !== messageLines.length) {
                    messageLines = nextLines;
                }
                clearTransientMessageTimer();
            }

            function dropExistingTransientMessages() {
                const nextLines = messageLines.filter(line => !(line && typeof line === "object" && line.transient));
                if (nextLines.length !== messageLines.length) {
                    messageLines = nextLines;
                }
            }

            function clearHistoryMessages() {
                historyLines = [];
                clearHistoryMessageTimer();
            }

            function scheduleTransientMessageClear() {
                clearTransientMessageTimer();
                if (!messageLines.some(line => line && typeof line === "object" && line.transient)) return;
                transientMessageTimer = setTimeout(() => {
                    clearTransientMessages();
                    refreshMessages();
                }, 3500);
            }

            function scheduleHistoryMessageClear() {
                clearHistoryMessageTimer();
                if (!historyLines.some(line => line && typeof line === "object" && line.history)) return;
                historyMessageTimer = setTimeout(() => {
                    clearHistoryMessages();
                    refreshMessages();
                }, 8000);
            }

            function isTransientUiMessage(kind, id, content) {
                if (kind === "confirm" || kind === "return_prompt") return false;
                const text = String(content ?? "");
                if (!text) return false;
                if (kind === "emsg" || kind === "echoerr" || kind === "wmsg") return true;
                return !text.includes("\n");
            }

            function shouldReplaceLatestMessage(kind, id) {
                if (id != null) return false;
                if (kind === "confirm" || kind === "return_prompt") return false;
                if (Number.isFinite(msgGridRow)) return false;
                const last = messageLines.length > 0 ? messageLines[messageLines.length - 1] : null;
                return !!(last && typeof last === "object" && last.id == null && last.kind !== "confirm" && last.kind !== "return_prompt");
            }

            function getActiveCmdlineState(level) {
                if (cmdlines.size === 0) return null;
                const activeLevel = level && cmdlines.has(level)
                    ? level
                    : Math.max(...cmdlines.keys());
                const state = cmdlines.get(activeLevel);
                return state ? { level: activeLevel, state } : null;
            }

            function renderCmdline(level) {
                if (!cmdlineEl) return;

                if (cmdlines.size === 0) {
                    cmdlineEl.style.display = "none";
                    cmdlineEl.innerHTML = "";
                    cmdlineEl.scrollLeft = 0;
                    cmdlineEl.dataset.wrapPrompt = "0";
                    updateOverlayLayout();
                    return;
                }

                const active = getActiveCmdlineState(level);
                if (!active?.state) {
                    cmdlineEl.style.display = "none";
                    cmdlineEl.innerHTML = "";
                    cmdlineEl.scrollLeft = 0;
                    cmdlineEl.dataset.wrapPrompt = "0";
                    updateOverlayLayout();
                    return;
                }
                const state = active.state;

                const prefix = `${state.firstc || ""}${state.prompt || ""}${" ".repeat(Math.max(0, state.indent || 0))}`;
                const special = state.specialChar || "";
                const bodyChars = Array.from(state.text || "");
                const bodyCursor = Math.max(0, Math.min(bodyChars.length, state.pos || 0));
                const combinedChars = bodyChars.slice();
                if (special) {
                    if (state.specialShift) {
                        combinedChars.splice(bodyCursor, 0, special);
                    } else {
                        combinedChars.splice(bodyCursor, Math.min(1, Math.max(0, combinedChars.length - bodyCursor)), special);
                    }
                }
                const prefixChars = Array.from(prefix);
                const fullChars = prefixChars.concat(combinedChars);
                const cursorPos = Math.max(0, Math.min(combinedChars.length, bodyCursor));
                const cursorIndex = Math.max(0, Math.min(fullChars.length, prefixChars.length + cursorPos));
                const wrapPrompt = !state.firstc && !!state.prompt && bodyChars.length === 0;

                cmdlineEl.dataset.wrapPrompt = wrapPrompt ? "1" : "0";
                cmdlineEl.style.whiteSpace = wrapPrompt ? "pre-wrap" : "pre";
                cmdlineEl.style.height = wrapPrompt ? "auto" : `${cellH}px`;
                cmdlineEl.style.minHeight = `${cellH}px`;
                cmdlineEl.style.overflowX = "hidden";
                cmdlineEl.style.overflowY = "hidden";
                cmdlineEl.style.overflowWrap = wrapPrompt ? "anywhere" : "normal";
                cmdlineEl.style.width = "auto";
                cmdlineEl.style.maxWidth = "none";

                if (fullChars.length === 0) {
                    cmdlineEl.innerHTML = '<span class="cmdline-cursor">&nbsp;</span>';
                    cmdlineEl.style.display = "block";
                    updateOverlayLayout();
                    return;
                }

                const before = escapeHtml(fullChars.slice(0, cursorIndex).join(""));
                const cursorChar = escapeHtml(fullChars[cursorIndex] ?? " ");
                const after = escapeHtml(fullChars.slice(cursorIndex + 1).join(""));
                cmdlineEl.innerHTML = `${before}<span class="cmdline-cursor">${cursorChar === " " ? "&nbsp;" : cursorChar}</span>${after}`;
                cmdlineEl.style.display = "block";
                updateOverlayLayout();
                const cursorEl = cmdlineEl.querySelector(".cmdline-cursor");
                if (!wrapPrompt && cursorEl) {
                    const cursorLeft = cursorEl.offsetLeft || 0;
                    const cursorRight = cursorLeft + Math.max(cellW, cursorEl.offsetWidth || 0);
                    const viewportLeft = cmdlineEl.scrollLeft || 0;
                    const viewportWidth = Math.max(1, cmdlineEl.clientWidth || 0);
                    const viewportRight = viewportLeft + viewportWidth;
                    if (cursorRight > viewportRight) {
                        cmdlineEl.scrollLeft = Math.max(0, cursorRight - viewportWidth);
                    } else if (cursorLeft < viewportLeft) {
                        cmdlineEl.scrollLeft = Math.max(0, cursorLeft);
                    }
                } else if (wrapPrompt) {
                    cmdlineEl.scrollLeft = 0;
                }
            }

            function refreshCmdlineBlock() {
                if (!cmdblockEl) return;

                if (cmdlineBlock.length === 0) {
                    cmdblockEl.style.display = "none";
                    cmdblockEl.innerHTML = "";
                    updateOverlayLayout();
                    return;
                }

                cmdblockEl.innerHTML = cmdlineBlock
                    .map(line => `<div>${escapeHtml(line)}</div>`)
                    .join("");
                cmdblockEl.style.maxHeight = `${Math.max(cellH * 2, Math.floor(root.clientHeight * 0.4))}px`;
                cmdblockEl.style.display = "block";
                updateOverlayLayout();
            }

            function refreshMessages() {
                if (!messagesEl) return;
                messagesEl.innerHTML = "";

                const activeEntries = historyLines.length > 0 ? historyLines : messageLines;
                const showMessageLinesDuringCmdline =
                    historyLines.length > 0 || Number.isFinite(msgGridRow) || hasConfirmMessages();
                const visibleEntries = cmdlines.size > 0
                    ? (showMessageLinesDuringCmdline ? activeEntries : [])
                    : (historyLines.length > 0 ? historyLines : messageLines.slice(-8));
                for (const entry of visibleEntries) {
                    const normalizedEntry = entry && typeof entry === "object"
                        ? entry
                        : { text: String(entry ?? ""), kind: "", chunks: [{ text: String(entry ?? ""), hlId: 0 }] };
                    messagesEl.appendChild(createMessageLineElement(normalizedEntry, !!normalizedEntry.history));
                }

                const showStatusLine = cmdlines.size === 0 && (msgShowmode || msgShowcmd || msgRuler);
                if (showStatusLine) {
                    const div = document.createElement("div");
                    div.className = "msgline msgstatus";

                    const left = document.createElement("span");
                    left.className = "msgstatus-left";
                    left.textContent = msgShowmode || "";
                    div.appendChild(left);

                    const mid = document.createElement("span");
                    mid.className = "msgstatus-mid";
                    mid.textContent = msgShowcmd || "";
                    div.appendChild(mid);

                    const right = document.createElement("span");
                    right.className = "msgstatus-right";
                    right.textContent = msgRuler || "";
                    div.appendChild(right);

                    messagesEl.appendChild(div);
                }

                msgGridVisible = messagesEl.childElementCount > 0;
                updateMessagePosition();
                updateOverlayLayout();
            }

            function debugEvent(name, payload) {
                if (!uiDebugEnabled) return;
                const mappedName = debugEventNameMap[name] || name;
                if (!debugEventAllowList.has(mappedName)) return;

                try {
                    const summary = summarizeDebugPayload(mappedName, payload);
                    console.debug(`[nvim-ui] ${mappedName} ${summary}`);
                    post({ type: "debug", data: `[web] ${mappedName} ${summary}` });
                } catch {
                }
            }

            function reportUiRuntimeError(source, error) {
                const text = error && error.stack
                    ? `${source}: ${error.stack}`
                    : `${source}: ${String(error ?? "")}`;
                showErr(text);
                try {
                    post({ type: "debug", data: `[web] runtime_error ${truncateDebugText(text, 240)}` });
                } catch {
                }
            }

            let overlayBottomInset = 0;

            function updateMessagePosition() {
                if (!messagesEl) return;

                if (!msgGridVisible || messagesEl.childElementCount === 0) {
                    messagesEl.style.display = "none";
                    messagesEl.style.maxHeight = "";
                    messagesEl.style.overflow = "visible";
                    messagesEl.style.pointerEvents = "none";
                    return;
                }

                messagesEl.style.display = "block";
                const topInset = root.offsetTop || 0;
                const maxMessageHeight = `${Math.max(cellH * 2, Math.floor(root.clientHeight * 0.33))}px`;
                const confirmAvailableHeight = Math.max(cellH * 6, Math.floor(root.clientHeight - topInset - overlayBottomInset - 4));
                const confirmMessageHeight = `${confirmAvailableHeight}px`;
                const bottomInset = `${overlayBottomInset}px`;
                if (Number.isFinite(msgGridRow)) {
                    messagesEl.style.top = `${topInset + msgGridRow * cellH}px`;
                    messagesEl.style.bottom = "auto";
                    messagesEl.style.maxHeight = maxMessageHeight;
                    messagesEl.style.overflow = "auto";
                    messagesEl.style.pointerEvents = "none";
                } else if (hasConfirmMessages()) {
                    messagesEl.style.maxHeight = confirmMessageHeight;
                    messagesEl.style.overflow = "auto";
                    messagesEl.style.pointerEvents = "auto";
                    if (messagesEl.scrollHeight > confirmAvailableHeight) {
                        messagesEl.style.top = `${topInset}px`;
                        messagesEl.style.bottom = "auto";
                    } else {
                        messagesEl.style.top = "auto";
                        messagesEl.style.bottom = bottomInset;
                    }
                } else if (cmdlines.size > 0 || cmdlineBlock.length > 0) {
                    messagesEl.style.top = "auto";
                    messagesEl.style.bottom = bottomInset;
                    messagesEl.style.maxHeight = maxMessageHeight;
                    messagesEl.style.overflow = "auto";
                    messagesEl.style.pointerEvents = "none";
                } else {
                    messagesEl.style.top = "auto";
                    messagesEl.style.bottom = bottomInset;
                    messagesEl.style.maxHeight = maxMessageHeight;
                    messagesEl.style.overflow = "auto";
                    messagesEl.style.pointerEvents = "none";
                }
            }

            function renderTabline(state) {
                if (!tablineEl) return;

                const tabs = Array.isArray(state?.tabs) ? state.tabs : [];
                if (tabs.length === 0) {
                    tablineEl.style.display = "none";
                    tablineEl.innerHTML = "";
                    updateOverlayLayout();
                    return;
                }

                tablineEl.innerHTML = tabs.map(tab => {
                    const cls = ["tabitem"];
                    if (tab.current) cls.push("current");
                    if (tab.changed) cls.push("modified");
                    const fullLabel = tab.label || String(tab.index || "");
                    const label = escapeHtml(tabDisplayLabel(fullLabel));
                    const title = escapeHtml(fullLabel);
                    const badge = escapeHtml(tabBadge(fullLabel));
                    return `<span class="${cls.join(" ")}" data-index="${tab.index}" title="${title}"><span class="tabicon">${badge}</span><span class="tablabel">${label}</span><button class="tabclose" data-index="${tab.index}" type="button">x</button></span>`;
                }).join("");
                tablineEl.style.display = "block";

                tablineEl.querySelectorAll(".tabitem").forEach(el => {
                    el.addEventListener("click", (ev) => {
                        if (ev.target && ev.target.closest(".tabclose")) return;
                        const index = Number(el.getAttribute("data-index") || 0);
                        if (index > 0) post({ type: "tabSwitch", index });
                    });
                });
                tablineEl.querySelectorAll(".tabclose").forEach(el => {
                    el.addEventListener("click", (ev) => {
                        ev.preventDefault();
                        ev.stopPropagation();
                        const index = Number(el.getAttribute("data-index") || 0);
                        if (index > 0) post({ type: "tabClose", index });
                    });
                });

                updateOverlayLayout();
            }

            function getPopupmenuAnchorPosition(gridId, row, col) {
                if (gridId === -1 && cmdlineEl && cmdlineEl.style.display !== "none") {
                    const rect = cmdlineEl.getBoundingClientRect();
                    return { x: rect.left + col * cellW, y: rect.top + row * cellH };
                }

                if (composing && ime && gridId === (cursor.grid || 1) && row === cursor.r && col === cursor.c) {
                    const imeRect = ime.getBoundingClientRect();
                    return { x: imeRect.left, y: imeRect.top };
                }

                const gs = getGridState(gridId) || getGridState(1) || { x: 0, y: 0 };
                const rootRect = root.getBoundingClientRect();
                return {
                    x: rootRect.left + (gs.x || 0) + col * cellW,
                    y: rootRect.top + (gs.y || 0) + row * cellH
                };
            }

            function getPopupmenuPlacement(anchor, menuWidth, menuHeight) {
                const rootRect = root.getBoundingClientRect();
                const margin = 4;
                const maxLeft = Math.max(rootRect.left + margin, rootRect.right - menuWidth - margin);
                const left = Math.max(rootRect.left + margin, Math.min(maxLeft, anchor.x));

                const belowTop = anchor.y + cellH;
                const aboveTop = anchor.y - menuHeight;
                const availableBelow = Math.max(cellH, Math.floor(rootRect.bottom - belowTop - margin));
                const availableAbove = Math.max(cellH, Math.floor(anchor.y - rootRect.top - margin));
                const placeBelow = availableBelow >= menuHeight || availableBelow >= availableAbove;
                const maxHeight = Math.max(cellH, placeBelow ? availableBelow : availableAbove);
                const top = placeBelow
                    ? Math.max(rootRect.top + margin, Math.min(rootRect.bottom - margin - Math.min(menuHeight, maxHeight), belowTop))
                    : Math.max(rootRect.top + margin, Math.min(rootRect.bottom - margin - Math.min(menuHeight, maxHeight), aboveTop));

                return {
                    left: Math.round(left),
                    top: Math.round(top),
                    maxHeight: Math.round(maxHeight),
                    placeBelow
                };
            }

            function renderPopupmenu() {
                if (!popupmenuEl) return;
                if (!popupmenuState || !Array.isArray(popupmenuState.items) || popupmenuState.items.length === 0) {
                    popupmenuEl.style.display = "none";
                    popupmenuEl.innerHTML = "";
                    lastPopupBoundsKey = "";
                    return;
                }

                const pmenuHl = getUiGroupHighlight("Pmenu");
                const pmenuSelHl = getUiGroupHighlight("PmenuSel");
                const pmenuSbarHl = getUiGroupHighlight("PmenuSbar");
                const pmenuThumbHl = getUiGroupHighlight("PmenuThumb");
                const pmenuBg = blendBackgroundColor(pmenuHl?.bg || defBg, pmenuHl || {}, defBg);
                const pmenuFg = readableFg(pmenuHl?.fg || defFg, pmenuHl?.bg || defBg);
                const pmenuBorder = pmenuHl?.special || pmenuHl?.fg || "rgba(255, 255, 255, 0.14)";
                const pmenuSbarBg = blendBackgroundColor(pmenuSbarHl?.bg || pmenuHl?.bg || defBg, pmenuSbarHl || pmenuHl || {}, pmenuHl?.bg || defBg);
                const pmenuThumbBg = blendBackgroundColor(pmenuThumbHl?.bg || pmenuThumbHl?.fg || pmenuSelHl?.bg || pmenuHl?.fg || defFg, pmenuThumbHl || pmenuSelHl || pmenuHl || {}, pmenuHl?.bg || defBg);
                popupmenuEl.style.background = pmenuBg;
                popupmenuEl.style.color = pmenuFg;
                popupmenuEl.style.borderColor = pmenuBorder;
                popupmenuEl.style.boxShadow = floatShadowEnabled
                    ? "0 12px 28px rgba(0, 0, 0, 0.35)"
                    : "none";
                popupmenuEl.style.zIndex = "40";
                popupmenuEl.style.setProperty("--pum-sbar", pmenuSbarBg);
                popupmenuEl.style.setProperty("--pum-thumb", pmenuThumbBg);

                popupmenuEl.innerHTML = popupmenuState.items.map((item, index) => {
                    const cls = index === popupmenuState.selected ? "pumitem selected" : "pumitem";
                    return `<div class="${cls}" data-index="${index}"><span>${escapeHtml(item.word || "")}</span><span class="pum-kind">${escapeHtml(item.kind || "")}</span><span class="pum-extra">${escapeHtml(item.menu || "")}</span></div>`;
                }).join("");
                popupmenuEl.style.visibility = "hidden";
                popupmenuEl.style.display = "block";
                popupmenuEl.style.maxHeight = `${Math.max(cellH * 2, Math.floor(root.clientHeight - 8))}px`;
                if (pmenuSelHl) {
                    popupmenuEl.querySelectorAll(".pumitem.selected").forEach(el => {
                        el.style.background = blendBackgroundColor(pmenuSelHl.bg || pmenuHl?.bg || defBg, pmenuSelHl, pmenuHl?.bg || defBg);
                        el.style.color = readableFg(pmenuSelHl.fg || pmenuHl?.fg || defFg, pmenuSelHl.bg || pmenuHl?.bg || defBg);
                    });
                }

                const anchor = getPopupmenuAnchorPosition(popupmenuState.grid, popupmenuState.row, popupmenuState.col);
                const placement = getPopupmenuPlacement(anchor, popupmenuEl.offsetWidth, popupmenuEl.offsetHeight);
                popupmenuEl.style.maxHeight = `${placement.maxHeight}px`;
                popupmenuEl.style.left = `${placement.left}px`;
                popupmenuEl.style.top = `${placement.top}px`;
                popupmenuEl.style.visibility = "visible";
                const selectedEl = popupmenuEl.querySelector(".pumitem.selected");
                if (selectedEl && typeof selectedEl.scrollIntoView === "function") {
                    selectedEl.scrollIntoView({ block: "nearest" });
                }
                const rootRect = root.getBoundingClientRect();
                const bounds = {
                    type: "pumBounds",
                    x: placement.left,
                    y: placement.top,
                    width: popupmenuEl.offsetWidth,
                    height: popupmenuEl.offsetHeight,
                    pumCol: (placement.left - rootRect.left) / Math.max(1, cellW),
                    pumRow: (placement.top - rootRect.top) / Math.max(1, cellH)
                };
                const boundsKey = [
                    bounds.x,
                    bounds.y,
                    bounds.width,
                    bounds.height,
                    bounds.pumCol.toFixed(3),
                    bounds.pumRow.toFixed(3)
                ].join(":");
                if (boundsKey !== lastPopupBoundsKey) {
                    lastPopupBoundsKey = boundsKey;
                    post(bounds);
                }
            }

            function updateOverlayLayout() {
                const tablineVisible = !!tablineEl && tablineEl.style.display !== "none" && tablineEl.innerHTML !== "";
                const cmdlineVisible = !!cmdlineEl && cmdlineEl.style.display !== "none" && cmdlineEl.innerHTML !== "";
                const cmdblockVisible = !!cmdblockEl && cmdblockEl.style.display !== "none" && cmdblockEl.innerHTML !== "";
                const rootRect = root.getBoundingClientRect();
                const overlayLeft = Math.max(0, Math.round(rootRect.left));
                const overlayWidth = Math.max(1, Math.round(rootRect.width || window.innerWidth));

                const tablineHeight = tablineVisible ? Math.ceil(tablineEl.offsetHeight) : 0;
                const cmdlineHeight = cmdlineVisible ? Math.ceil(cmdlineEl.offsetHeight) : 0;
                const cmdblockHeight = cmdblockVisible ? Math.ceil(cmdblockEl.offsetHeight) : 0;

                if (messagesEl) {
                    messagesEl.style.left = `${overlayLeft}px`;
                    messagesEl.style.right = "auto";
                    messagesEl.style.width = `${overlayWidth}px`;
                    messagesEl.style.maxWidth = `${overlayWidth}px`;
                }
                if (cmdlineEl) {
                    cmdlineEl.style.left = `${overlayLeft}px`;
                    cmdlineEl.style.right = "auto";
                    cmdlineEl.style.width = `${overlayWidth}px`;
                    cmdlineEl.style.maxWidth = `${overlayWidth}px`;
                }
                if (cmdblockEl) {
                    cmdblockEl.style.left = `${overlayLeft}px`;
                    cmdblockEl.style.right = "auto";
                    cmdblockEl.style.width = `${overlayWidth}px`;
                    cmdblockEl.style.maxWidth = `${overlayWidth}px`;
                }
                if (cmdlineEl && cmdlineEl.dataset.wrapPrompt !== "1") cmdlineEl.style.height = `${cellH}px`;
                if (cmdblockEl) cmdblockEl.style.lineHeight = `${cellH}px`;
                if (cmdlineEl) cmdlineEl.style.bottom = "0px";
                if (cmdblockEl) cmdblockEl.style.bottom = `${cmdlineHeight}px`;

                const nextTopInset = tablineHeight;
                if (nextTopInset !== tablineTopInset) {
                    tablineTopInset = nextTopInset;
                    root.style.top = `${tablineTopInset}px`;
                    onResize();
                }
                root.style.bottom = "0px";
                overlayBottomInset = cmdlineHeight + cmdblockHeight;

                updateMessagePosition();
                renderPopupmenu();
            }

            // --- rendering ---
            let paintPending = false;

            function schedulePaint() {
                if (paintPending) return;
                paintPending = true;
                requestAnimationFrame(() => {
                    paintPending = false;
                    paint();
                });
            }

            function getHighlightAttrs(hlId) {
                const a = hl.get(hlId) || {};

                let fg = a.fg || defFg;
                let bg = a.bg || defBg;

                if (a.reverse) {
                    const tmp = fg;
                    fg = bg;
                    bg = tmp;
                }

                return {
                    fg,
                    bg,
                    bold: !!a.bold,
                    italic: !!a.italic,
                    underline: !!a.underline,
                    undercurl: !!a.undercurl,
                    underdouble: !!a.underdouble,
                    underdotted: !!a.underdotted,
                    underdashed: !!a.underdashed,
                    strikethrough: !!a.strikethrough,
                    reverse: !!a.reverse,
                    blend: toBlend(a.blend),
                    special: a.special || fg,
                    info: Array.isArray(a.info) ? a.info : []
                };
            }

            function getColors(hlId) {
                const { fg, bg } = getHighlightAttrs(hlId);
                return { fg, bg };
            }

            function blendBackgroundColor(bg, attrs, fallbackBg = defBg) {
                const blend = toBlend(attrs?.blend);
                if (blend <= 0) return bg || fallbackBg;
                return mixColors(bg || fallbackBg, fallbackBg, (100 - blend));
            }

            function getUiGroupHighlight(name) {
                const hlId = uiHlGroups.get(String(name || ""));
                return hlId == null ? null : getHighlightAttrs(hlId);
            }

            function normalizeHexColor(value) {
                return String(value || "").trim().toLowerCase();
            }

            function parseHexColor(value) {
                const color = normalizeHexColor(value);
                if (!/^#[0-9a-f]{6}$/.test(color)) return null;
                return {
                    r: parseInt(color.slice(1, 3), 16),
                    g: parseInt(color.slice(3, 5), 16),
                    b: parseInt(color.slice(5, 7), 16)
                };
            }

            function mixColors(topColor, bottomColor, topPercent) {
                const top = parseHexColor(topColor);
                const bottom = parseHexColor(bottomColor);
                if (!top) return bottomColor || topColor || defBg;
                if (!bottom) return topColor || bottomColor || defBg;

                const alpha = Math.max(0, Math.min(1, Number(topPercent) / 100));
                const inv = 1 - alpha;
                const r = Math.round(top.r * alpha + bottom.r * inv);
                const g = Math.round(top.g * alpha + bottom.g * inv);
                const b = Math.round(top.b * alpha + bottom.b * inv);
                return `#${r.toString(16).padStart(2, "0")}${g.toString(16).padStart(2, "0")}${b.toString(16).padStart(2, "0")}`;
            }

            function readableFgForBg(bg) {
                const color = normalizeHexColor(bg);
                if (!/^#[0-9a-f]{6}$/.test(color)) return defFg;
                const r = parseInt(color.slice(1, 3), 16);
                const g = parseInt(color.slice(3, 5), 16);
                const b = parseInt(color.slice(5, 7), 16);
                const luminance = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
                return luminance > 0.5 ? "#000000" : "#ffffff";
            }

            function readableFg(fg, bg) {
                if (normalizeHexColor(fg) !== normalizeHexColor(bg)) return fg || defFg;
                if (normalizeHexColor(defFg) !== normalizeHexColor(bg)) return defFg;
                return readableFgForBg(bg);
            }

            function setCtxFont(attrs) {
                const style = attrs.italic ? "italic" : "normal";
                const weight = attrs.bold ? "bold" : "normal";
                ctx.font = `${style} ${weight} ${fontSize}px ${fontFamily}`;
            }

            function drawCellText(ch, x, y, fg, attrs) {
                const baselineY = y + textYOffset;
                ctx.save();
                setCtxFont(attrs || {});
                ctx.fillStyle = fg;
                ctx.fillText(ch, x, baselineY);
                ctx.restore();
            }

            function drawCellDecorations(x, y, width, attrs) {
                if (!attrs) return;
                const hasUnderline =
                    !!attrs.underline
                    || !!attrs.undercurl
                    || !!attrs.underdouble
                    || !!attrs.underdotted
                    || !!attrs.underdashed;
                const hasStrike = !!attrs.strikethrough;
                if (!hasUnderline && !hasStrike) return;

                const uy = y + cellH - 2;
                const strikeY = y + Math.max(2, Math.floor(cellH * 0.55));
                ctx.save();
                ctx.strokeStyle = attrs.special || attrs.fg || defFg;
                ctx.lineWidth = 1;
                if (typeof ctx.setLineDash === "function") ctx.setLineDash([]);

                if (attrs.undercurl) {
                    ctx.beginPath();
                    const amp = Math.max(1, Math.floor(cellH / 10));
                    const wave = Math.max(4, Math.floor(cellW / 2));
                    let px = x;
                    let up = true;
                    ctx.moveTo(px, uy);
                    while (px < x + width) {
                        const nx = Math.min(px + wave / 2, x + width);
                        ctx.lineTo(nx, uy + (up ? -amp : amp));
                        px = nx;
                        up = !up;
                    }
                    ctx.stroke();
                } else if (attrs.underdouble) {
                    ctx.beginPath();
                    ctx.moveTo(x, uy - 2);
                    ctx.lineTo(x + width, uy - 2);
                    ctx.moveTo(x, uy);
                    ctx.lineTo(x + width, uy);
                    ctx.stroke();
                } else if (attrs.underdotted) {
                    if (typeof ctx.setLineDash === "function") ctx.setLineDash([1, 2]);
                    ctx.beginPath();
                    ctx.moveTo(x, uy);
                    ctx.lineTo(x + width, uy);
                    ctx.stroke();
                    if (typeof ctx.setLineDash === "function") ctx.setLineDash([]);
                } else if (attrs.underdashed) {
                    if (typeof ctx.setLineDash === "function") ctx.setLineDash([4, 2]);
                    ctx.beginPath();
                    ctx.moveTo(x, uy);
                    ctx.lineTo(x + width, uy);
                    ctx.stroke();
                    if (typeof ctx.setLineDash === "function") ctx.setLineDash([]);
                } else if (attrs.underline) {
                    ctx.beginPath();
                    ctx.moveTo(x, uy);
                    ctx.lineTo(x + width, uy);
                    ctx.stroke();
                }

                if (hasStrike) {
                    if (typeof ctx.setLineDash === "function") ctx.setLineDash([]);
                    ctx.beginPath();
                    ctx.moveTo(x, strikeY);
                    ctx.lineTo(x + width, strikeY);
                    ctx.stroke();
                }

                ctx.restore();
            }

            function isTerminalLikeMode(modeName) {
                return String(modeName || "").toLowerCase().startsWith("terminal");
            }

            function shouldUseImeInsertCursor() {
                return isTerminalLikeMode(currentModeName) && (composing || !!(ime && ime.value));
            }

            function drawImeInsertCursor(cx, cy, cursorW, cell, attrs) {
                const bg = attrs.bg || defBg;
                const fg = readableFg(attrs.fg, bg);
                const ch = cell.ch || " ";

                if (ch !== " ") {
                    ctx.save();
                    ctx.globalAlpha = 0.58;
                    ctx.fillStyle = bg || defBg;
                    ctx.fillRect(cx, cy, cursorW, cellH);
                    ctx.restore();

                    ctx.save();
                    ctx.globalAlpha = 0.45;
                    drawCellText(ch, cx, cy, fg, attrs);
                    drawCellDecorations(cx, cy, cursorW, attrs);
                    ctx.restore();
                }

                const lineW = Math.max(1, Math.min(2, Math.round(cellW * 0.18)));
                ctx.save();
                ctx.fillStyle = fg || defFg;
                ctx.fillRect(cx, cy + 1, lineW, Math.max(1, cellH - 2));
                ctx.restore();
            }

            function paint() {
                const w = root.clientWidth;
                const h = root.clientHeight;

                ctx.font = `${fontSize}px ${fontFamily}`;
                ctx.textBaseline = "alphabetic";
                ctx.direction = "ltr";

                ctx.fillStyle = defBg;
                ctx.fillRect(0, 0, w, h);

                const paintGrid = (gs) => {
                    if (!gs) return;
                    const gx = Math.round(gs.x || 0);
                    const gy = Math.round(gs.y || 0);
                    const visibleCols = Math.max(0, Math.min(gs.cols, gs.outerCols || gs.cols));
                    const visibleRows = Math.max(0, Math.min(gs.rows, gs.outerRows || gs.rows));

                    if (floatShadowEnabled && gs.floating && visibleCols > 0 && visibleRows > 0) {
                        ctx.save();
                        ctx.fillStyle = "rgba(0,0,0,0.22)";
                        ctx.fillRect(gx + 6, gy + 6, visibleCols * cellW, visibleRows * cellH);
                        ctx.restore();
                    }

                    if (gs.floating && visibleCols > 0 && visibleRows > 0) {
                        let sampleBg = null;
                        for (let sr = 0; sr < visibleRows && !sampleBg; sr++) {
                            for (let sc = 0; sc < visibleCols; sc++) {
                                const sample = gs.cells[sr]?.[sc];
                                if (!sample) continue;
                                const attrs = getHighlightAttrs(sample.hl);
                                const bg = blendBackgroundColor(attrs.bg, attrs, defBg);
                                if (bg && bg !== defBg) {
                                    sampleBg = bg;
                                    break;
                                }
                            }
                        }
                        ctx.fillStyle = sampleBg || defBg;
                        ctx.fillRect(gx, gy, visibleCols * cellW, visibleRows * cellH);
                    }

                    for (let r = 0; r < visibleRows; r++) {
                        const y = gy + r * cellH;
                        if (y >= h || y + cellH <= 0) continue;

                        for (let c = visibleCols - 1; c >= 0; c--) {
                            const x = gx + c * cellW;
                            if (x >= w) continue;
                            if (x + cellW <= 0) continue;

                            const cell = gs.cells[r][c];
                            const attrs = getHighlightAttrs(cell.hl);
                            const bg = blendBackgroundColor(attrs.bg, attrs, defBg);

                            ctx.fillStyle = bg || defBg;
                            ctx.fillRect(x, y, cellW, cellH);
                        }

                        for (let c = 0; c < visibleCols; c++) {
                            const x = gx + c * cellW;
                            if (x >= w) break;
                            if (x + cellW <= 0) continue;

                            const cell = gs.cells[r][c];
                            const attrs = getHighlightAttrs(cell.hl);
                            const bg = blendBackgroundColor(attrs.bg, attrs, defBg);
                            const ch = cell.ch || "";

                            if (!ch || ch === " ") continue;

                            drawCellText(ch, x, y, readableFg(attrs.fg, bg), attrs);
                            drawCellDecorations(x, y, cellW, attrs);
                        }
                    }
                };

                for (const gs of eachVisibleGridInPaintOrder()) {
                    paintGrid(gs);
                }

                const cgs = getGridState(cursor.grid || 1) || getGridState(1);
                if (cgs && cursorVisible) {
                    const cx = Math.round((cgs.x || 0) + cursor.c * cellW);
                    const cy = Math.round((cgs.y || 0) + cursor.r * cellH);

                    if (cx < w && cy < h && cursor.r >= 0 && cursor.r < cgs.rows && cursor.c >= 0 && cursor.c < cgs.cols) {
                        const cell = cgs.cells[cursor.r][cursor.c] || { ch: " ", hl: 0, cont: false };
                        const attrs = getHighlightAttrs(cell.hl);
                        const ch = cell.ch || " ";

                        let cursorW = cellW;
                        if (ch && ch !== " ") {
                            const measuredW = ctx.measureText(ch).width;
                            cursorW = Math.max(cellW, Math.min(Math.ceil(measuredW), cellW * 2));
                        }
                        cursorW = Math.min(cursorW, w - cx);

                        if (shouldUseImeInsertCursor()) {
                            drawImeInsertCursor(cx, cy, cursorW, cell, attrs);
                        } else if (currentCursorShape === "vertical") {
                            const cw = Math.max(1, Math.round((cellW * currentCellPercentage) / 100));
                            ctx.fillStyle = attrs.fg || defFg;
                            ctx.fillRect(cx, cy, cw, cellH);

                            if (ch !== " ") {
                                drawCellText(ch, cx, cy, attrs.fg || defFg, attrs);
