<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
        }

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg);
        }

        #root {
            position: fixed;
            inset: 0;
            background: var(--bg);
        }

        canvas {
            position: absolute;
            inset: 0;
            display: block;
        }

        #booterr {
            position: fixed;
            inset: 0;
            padding: 12px;
            font: 14px/1.4 monospace;
            color: #fff;
            background: #300;
            display: none;
            white-space: pre-wrap;
        }

        #tabline {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            display: none;
            min-height: 1.9em;
            padding: 2px 6px;
            background: color-mix(in srgb, var(--bg) 88%, #ffffff 12%);
            color: var(--fg);
            font: 14px/1 monospace;
            z-index: 30;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            white-space: nowrap;
            overflow: hidden;
        }

        .tabitem {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 3px 8px;
            margin-right: 4px;
            border-radius: 4px 4px 0 0;
            background: rgba(255, 255, 255, 0.08);
            cursor: default;
        }

        .tabitem.current {
            background: rgba(255, 255, 255, 0.2);
            font-weight: 700;
        }

        .tabicon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.6em;
            padding: 0 0.35em;
            border-radius: 999px;
            font-size: 0.82em;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0.85;
        }

        .tabclose {
            border: 0;
            background: transparent;
            color: inherit;
            padding: 0 2px;
            font: inherit;
            line-height: 1;
            opacity: 0.7;
            cursor: pointer;
        }

        .tabclose:hover {
            opacity: 1;
        }

        .tabitem.modified::after {
            content: " +";
        }


        #messages {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            padding: 4px 8px;
            font: 14px/1 monospace;
            color: var(--fg);
            background: transparent;
            pointer-events: none;
            z-index: 20;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            box-sizing: border-box;
            max-width: none;
        }

        #messages:empty {
            display: none;
        }

        #popupmenu {
            position: fixed;
            display: none;
            min-width: 12ch;
            max-width: min(72ch, 90vw);
            max-height: min(18em, 55vh);
            overflow: hidden;
            background: color-mix(in srgb, var(--bg) 94%, #ffffff 6%);
            color: var(--fg);
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
            font: 14px/1 monospace;
            z-index: 40;
            box-sizing: border-box;
        }

        .pumitem {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            column-gap: 1ch;
            padding: 2px 8px;
            white-space: pre;
        }

        .pumitem.selected {
            background: rgba(255, 255, 255, 0.18);
        }

        .pum-kind,
        .pum-extra {
            opacity: 0.75;
        }

        .msgline {
            display: block;
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg);
            white-space: break-spaces;
            overflow-wrap: anywhere;
            word-break: break-all;
            box-sizing: border-box;
        }

        .msgcode.error {
            color: #ffffff;
            background: #8f2d2d;
        }

        #cmdblock,
        #cmdline {
            position: fixed;
            left: 0;
            right: 0;
            padding: 0 8px;
            font: 14px/1 monospace;
            color: var(--fg);
            background: var(--bg);
            pointer-events: none;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            z-index: 25;
            box-sizing: border-box;
        }

        #cmdblock {
            bottom: 2.4em;
            display: none;
            max-height: 40vh;
            overflow: hidden;
        }

        #cmdline {
            bottom: 0;
            display: none;
            white-space: pre;
            overflow: hidden;
        }

        .cmdline-cursor {
            background: var(--fg);
            color: var(--bg);
        }

        #ime {
            position: absolute;
            left: 0;
            top: 0;
            width: 24px;
            height: 20px;
            opacity: 0.01;
            border: 0;
            padding: 0;
            margin: 0;
            background: transparent;
            color: transparent;
            caret-color: transparent;
            outline: none;
            resize: none;
            overflow: hidden;
            white-space: nowrap;
            z-index: 10;
        }

        #ime.composing {
            opacity: 1;
            color: var(--fg);
            caret-color: var(--fg);
            background: transparent;
        }
    </style>
</head>
<body>
    <div id="tabline"></div>
    <div id="root"><textarea id="ime" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea><canvas id="cv"></canvas></div>
    <div id="booterr"></div>
    <div id="messages"></div>
    <div id="cmdblock"></div>
    <div id="cmdline"></div>
    <div id="popupmenu"></div>

    <script>
        (() => {
            const root = document.getElementById("root");
            const cv = document.getElementById("cv");
            const errEl = document.getElementById("booterr");
            const ime = document.getElementById("ime");
            const tablineEl = document.getElementById("tabline");
            const messagesEl = document.getElementById("messages");
            const cmdblockEl = document.getElementById("cmdblock");
            const cmdlineEl = document.getElementById("cmdline");
            const popupmenuEl = document.getElementById("popupmenu");

            let composing = false;
            let suppressNextInputText = null;
            let mouseLeftDown = false;
            let redrawKickTimer = 0;

            function showErr(msg) {
                errEl.style.display = "block";
                errEl.textContent = msg;
            }

            if (!window.chrome || !window.chrome.webview) {
                showErr("WebView2 webview bridge が見つかりません。WebView2 の初期化が完了しているか確認してください。");
                return;
            }

            const ctx = cv.getContext("2d", { alpha: false });
            if (!ctx) {
                showErr("Canvas 2D context が null です。");
                return;
            }

            const post = (obj) => window.chrome.webview.postMessage(JSON.stringify(obj));

            // --- font / cell metrics ---
            let fontFamily = "Consolas, monospace";
            let fontSize = 14;
            let lineHeight = 1.1;
            let cellW = 8, cellH = 16;
            let dpr = 1;
            let fontAscent = 11;
            let fontDescent = 3;
            let textYOffset = 0;

            function applyGuiFont(value) {
                if (!value) return;

                let s = String(value);

                // Vim/Neovim の guifont は space が \ か _ で表現されることがある
                s = s.replace(/\\ /g, " ").replace(/_/g, " ");

                // 例: "AdwaitaMono Nerd Font Mono:h11"
                const parts = s.split(":");
                const family = (parts[0] || "").trim();
                let size = fontSize;

                for (let i = 1; i < parts.length; i++) {
                    const p = parts[i].trim();
                    const m = /^h(\d+(?:\.\d+)?)$/i.exec(p);
                    if (m) {
                        const parsed = parseFloat(m[1]);
                        if (!Number.isNaN(parsed) && parsed > 0) size = parsed;
                    }
                }

                if (family) {
                    fontFamily = `"${family}", monospace`;
                }
                fontSize = size;

                updateMetrics();

                const cr = calcColsRows();
                if (cr.cols !== cols || cr.rows !== rows) {
                    allocGrid(cr.cols, cr.rows, 1);
                    post({ type: "resize", cols: cr.cols, rows: cr.rows });
                }

                syncImePosition();
                markAllDirty();
                schedulePaint();
            }

            function updateMetrics() {
                dpr = window.devicePixelRatio || 1;
                const w = root.clientWidth;
                const h = root.clientHeight;

                cv.width = Math.max(1, Math.floor(w * dpr));
                cv.height = Math.max(1, Math.floor(h * dpr));
                cv.style.width = w + "px";
                cv.style.height = h + "px";

                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.font = `${fontSize}px ${fontFamily}`;
                ctx.textBaseline = "alphabetic";

                const m = ctx.measureText("Mg");
                cellW = Math.max(4, Math.ceil(ctx.measureText("M").width));
                cellH = Math.max(8, Math.ceil(fontSize * lineHeight));

                fontAscent = Math.ceil(m.actualBoundingBoxAscent || fontSize * 0.8);
                fontDescent = Math.ceil(m.actualBoundingBoxDescent || fontSize * 0.2);

                const textH = fontAscent + fontDescent;
                textYOffset = Math.round((cellH - textH) / 2) + fontAscent + 1;

                const overlayFont = `${fontSize}px/${Math.max(1, cellH)}px ${fontFamily}`;
                if (messagesEl) messagesEl.style.font = overlayFont;
                if (cmdblockEl) cmdblockEl.style.font = overlayFont;
                if (cmdlineEl) cmdlineEl.style.font = overlayFont;
                if (popupmenuEl) popupmenuEl.style.font = overlayFont;
            }

            function calcColsRows() {
                const w = root.clientWidth;
                const h = root.clientHeight;
                const cols = Math.max(10, Math.floor(w / cellW));
                const rows = Math.max(5, Math.floor(h / cellH));
                return { cols, rows };
            }

            // --- highlight state ---
            const hl = new Map(); // id -> {fg,bg}
            let defFg = "#ffffff";
            let defBg = "#000000";

            function rgbIntToHex(n) {
                if (typeof n !== "number") return null;
                if (n < 0) return null;
                const s = (n >>> 0).toString(16).padStart(6, "0");
                return "#" + s;
            }

            // --- grid state ---
            let cols = 80, rows = 24;
            let grid = [];
            let cursor = { grid: 1, r: 0, c: 0 };
            let modeInfos = [];
            let currentModeName = "normal";
            let currentCursorShape = "block"; // block | vertical | horizontal
            let currentCellPercentage = 25;   // ver25 / hor20 など
            let gotAnyRedraw = false;
            let dirtyRows = null;
            let cursorVisible = true;
            let deferredPaintNeeded = false;

            const grids = new Map(); // id -> { id, cols, rows, cells, dirtyRows, x, y, z, visible, floating }

            function makeGridState(id, newCols, newRows) {
                const cells = new Array(newRows);
                const dr = new Uint8Array(newRows);
                dr.fill(1);

                for (let r = 0; r < newRows; r++) {
                    const row = new Array(newCols);
                    for (let c = 0; c < newCols; c++) {
                        row[c] = { ch: " ", hl: 0, cont: false };
                    }
                    cells[r] = row;
                }

                return {
                    id,
                    cols: newCols,
                    rows: newRows,
                    outerCols: newCols,
                    outerRows: newRows,
                    cells,
                    dirtyRows: dr,
                    x: 0,
                    y: 0,
                    z: id === 1 ? 0 : 100 + id,
                    visible: true,
                    floating: false,
                    viewport: null,
                    viewportMargins: { top: 0, bottom: 0, left: 0, right: 0 }
                };
            }

            function getGridState(id, create = false) {
                let gs = grids.get(id);
                if (!gs && create) {
                    gs = makeGridState(id, id === 1 ? cols : 1, id === 1 ? rows : 1);
                    grids.set(id, gs);
                }
                return gs || null;
            }

            function markDirtyRow(r, gridId = 1) {
                const gs = getGridState(gridId);
                if (!gs || !gs.dirtyRows) return;
                if (r >= 0 && r < gs.dirtyRows.length) gs.dirtyRows[r] = 1;
                if (gridId === 1) dirtyRows = gs.dirtyRows;
            }

            function markAllDirty(gridId = null) {
                if (gridId == null) {
                    for (const gs of grids.values()) {
                        if (gs.dirtyRows) gs.dirtyRows.fill(1);
                    }
                    if (grids.has(1)) dirtyRows = grids.get(1).dirtyRows;
                    return;
                }

                const gs = getGridState(gridId);
                if (!gs || !gs.dirtyRows) return;
                gs.dirtyRows.fill(1);
                if (gridId === 1) dirtyRows = gs.dirtyRows;
            }

            function allocGrid(newCols, newRows, gridId = 1) {
                const prev = getGridState(gridId);
                const gs = makeGridState(gridId, newCols, newRows);
                if (prev) {
                    const copyRows = Math.min(prev.rows || 0, newRows);
                    const copyCols = Math.min(prev.cols || 0, newCols);
                    for (let r = 0; r < copyRows; r++) {
                        for (let c = 0; c < copyCols; c++) {
                            const src = prev.cells?.[r]?.[c];
                            if (!src) continue;
                            gs.cells[r][c] = {
                                ch: src.ch || " ",
                                hl: src.hl || 0,
                                cont: !!src.cont
                            };
                        }
                    }
                    if (gs.dirtyRows) gs.dirtyRows.fill(1);
                    gs.x = prev.x || 0;
                    gs.y = prev.y || 0;
                    gs.z = prev.z || gs.z;
                    gs.visible = prev.visible !== false;
                    gs.floating = !!prev.floating;
                    gs.focusable = !!prev.focusable;
                    gs.overlayManaged = !!prev.overlayManaged;
                    gs.screenRow = prev.screenRow;
                    gs.screenCol = prev.screenCol;
                    gs.viewport = prev.viewport || null;
                    gs.viewportMargins = prev.viewportMargins || { top: 0, bottom: 0, left: 0, right: 0 };
                    if (prev.floating) {
                        gs.outerCols = prev.outerCols;
                        gs.outerRows = prev.outerRows;
                    }
                }
                if (gridId === 1) {
                    cols = newCols;
                    rows = newRows;
                    grid = gs.cells;
                    dirtyRows = gs.dirtyRows;
                }
                grids.set(gridId, gs);
            }

            function clearGrid(gridId = 1) {
                const gs = getGridState(gridId);
                if (!gs) return;

                for (let r = 0; r < gs.rows; r++) {
                    for (let c = 0; c < gs.cols; c++) {
                        gs.cells[r][c].ch = " ";
                        gs.cells[r][c].hl = 0;
                        gs.cells[r][c].cont = false;
                    }
                }
                markAllDirty(gridId);
            }

            function eachVisibleGridInPaintOrder() {
                return [...grids.values()]
                    .filter(g => g.id !== msgGridId)
                    .filter(g => !g.overlayManaged)
                    .filter(g => !shouldHideAsOverlayCompanion(g))
                    .filter(g => !shouldHideAsLowProfileFooterFloat(g))
                    .filter(g => !shouldHideAsShowmodeFloat(g))
                    .filter(g => g.id === 1 || g.visible !== false)
                    .sort((a, b) => (a.z || 0) - (b.z || 0));
            }

            function isOverlayManagedFloat(gs) {
                if (!gs || !gs.floating || !gs.focusable) return false;
                const screenRow = Number(gs.screenRow);
                const rowsCount = Math.max(0, gs.rows || 0);
                const colsCount = Math.max(0, gs.cols || 0);
                if (Number.isFinite(screenRow) && screenRow >= Math.max(0, rows - 4)) {
                    return true;
                }
                if (rowsCount > 2) return false;
                return Number.isFinite(screenRow)
                    && screenRow >= Math.max(0, rows - 6)
                    && colsCount >= Math.max(20, Math.floor(cols * 0.45));
            }

            function shouldHideAsOverlayCompanion(gs) {
                if (!gs || gs.overlayManaged || !gs.floating || gs.focusable) return false;
                const row = Number(gs.screenRow);
                const col = Number(gs.screenCol);
                if (!Number.isFinite(row) || !Number.isFinite(col)) return false;

                for (const other of grids.values()) {
                    if (!other || !other.overlayManaged) continue;
                    const otherRow = Number(other.screenRow);
                    const otherCol = Number(other.screenCol);
                    if (!Number.isFinite(otherRow) || !Number.isFinite(otherCol)) continue;
                    if (otherRow !== row) continue;

                    const otherEndCol = otherCol + Math.max(0, other.cols || 0);
                    const rowOverlap = Math.min(gs.rows || 0, other.rows || 0);
                    if (rowOverlap <= 0) continue;

                    if (col >= otherCol - 1 && col <= otherEndCol + 1) {
                        return true;
                    }
                }

                return false;
            }

            function shouldHideAsLowProfileFooterFloat(gs) {
                if (!gs || !gs.floating) return false;
                const row = Number(gs.screenRow);
                if (!Number.isFinite(row) || row < Math.floor(rows * 0.5)) return false;
                const rowsCount = Math.max(0, gs.rows || 0);
                const colsCount = Math.max(0, gs.cols || 0);

                if (gs.focusable) {
                    return rowsCount <= 2 && colsCount >= 12;
                }

                return colsCount <= 2 && rowsCount <= 12;
            }

            function shouldHideAsShowmodeFloat(gs) {
                if (!gs || !gs.floating || gs.focusable) return false;
                if (!msgShowmode) return false;
                const row = Number(gs.screenRow);
                if (!Number.isFinite(row) || row > 1) return false;
                const colsCount = Math.max(0, gs.cols || 0);
                const rowsCount = Math.max(0, gs.rows || 0);
                if (rowsCount > 8) return false;
                return colsCount <= 30 || colsCount === 1;
            }

            function shouldDebugFloatGridLine(gs, text) {
                if (!gs || !gs.floating) return false;
                const value = String(text ?? "");
                if (!value.trim()) return false;
                if (/\b(def|class|async|return|function|lambda|self|None|True|False)\b/.test(value)) return true;
                const rowsCount = Math.max(0, gs.rows || 0);
                const colsCount = Math.max(0, gs.cols || 0);
                return rowsCount > 1 && colsCount > 8 && value.length >= 3;
            }

            // --- messages ---
            let msgShowmode = "";
            let msgShowcmd = "";
            let msgRuler = "";
            let messageLines = [];
            const cmdlines = new Map();
            let cmdlineBlock = [];
            let msgGridRow = null;
            let msgGridVisible = false;
            let msgGridId = null;
            let transientMessageTimer = 0;
            let tablineTopInset = 0;
            let popupmenuState = null;

            function escapeHtml(text) {
                return String(text ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            function stableKey(value) {
                if (value == null) return "";
                if (typeof value === "string" || typeof value === "number" || typeof value === "boolean") {
                    return String(value);
                }
                try {
                    return JSON.stringify(value);
                } catch {
                    return String(value);
                }
            }

            function tabBadge(label) {
                const text = String(label || "").trim();
                if (!text) return "tab";
                const lower = text.toLowerCase();
                if (lower.endsWith("/") || lower.endsWith("\\")) return "dir";
                const parts = lower.split(/[\\/]/);
                const name = parts[parts.length - 1];
                const dot = name.lastIndexOf(".");
                if (dot > 0 && dot < name.length - 1) {
                    return name.slice(dot + 1, Math.min(name.length, dot + 4));
                }
                return name.slice(0, Math.min(3, name.length));
            }

            function chunksToText(chunks) {
                if (!Array.isArray(chunks)) return String(chunks ?? "");
                let s = "";
                for (const ch of chunks) {
                    const a = normalizeArg(ch);
                    if (a.length >= 2) s += String(a[1] ?? "");
                    else s += String(a[0] ?? "");
                }
                return s;
            }

            function isSwapfileConfirmText(text) {
                const value = String(text ?? "");
                return value.includes("Found a swap file by the name")
                    || (value.includes("Swap file") && value.includes("already exists!"));
            }

            function normalizeConfirmLayout(text) {
                const lines = String(text ?? "").split("\n");
                if (lines.length >= 3 && /^Found a swap file by the name\b/.test(lines[1] || "")) {
                    let datedText = "";
                    const explicitDatedIndex = lines.findIndex((line, index) => index > 1 && /^\s*dated:\s*/i.test(String(line ?? "")));
                    if (explicitDatedIndex >= 0) {
                        datedText = String(lines[explicitDatedIndex] ?? "").trim();
                        lines.splice(explicitDatedIndex, 1);
                    } else {
                        const datedLine = String(lines[2] ?? "").trim();
                        if (datedLine && !datedLine.includes(":") && /\d{4}\b/.test(datedLine)) {
                            datedText = `dated: ${datedLine}`;
                            lines.splice(2, 1);
                        }
                    }
                    if (datedText) {
                        lines[0] = `${String(lines[0] ?? "").trimEnd()}  ${datedText}`;
                    }
                }
                return lines.join("\n");
            }

            function normalizeMessageContent(kind, content) {
                const text = String(content ?? "");
                if (kind === "confirm" && isSwapfileConfirmText(text)) {
                    const withHeader = /^E325: ATTENTION\b/m.test(text) ? text : `E325: ATTENTION\n${text}`;
                    return normalizeConfirmLayout(withHeader);
                }
                return text;
            }

            function hasConfirmMessages() {
                return messageLines.some(line => line && typeof line === "object" && line.kind === "confirm");
            }

            function clearTransientMessageTimer() {
                if (transientMessageTimer) {
                    clearTimeout(transientMessageTimer);
                    transientMessageTimer = 0;
                }
            }

            function clearTransientMessages() {
                const nextLines = messageLines.filter(line => !(line && typeof line === "object" && line.transient));
                if (nextLines.length !== messageLines.length) {
                    messageLines = nextLines;
                }
                clearTransientMessageTimer();
            }

            function scheduleTransientMessageClear() {
                clearTransientMessageTimer();
                if (!messageLines.some(line => line && typeof line === "object" && line.transient)) return;
                transientMessageTimer = setTimeout(() => {
                    clearTransientMessages();
                    refreshMessages();
                }, 3500);
            }

            function renderCmdline(level) {
                if (!cmdlineEl) return;

                if (cmdlines.size === 0) {
                    cmdlineEl.style.display = "none";
                    cmdlineEl.innerHTML = "";
                    cmdlineEl.dataset.wrapPrompt = "0";
                    updateOverlayLayout();
                    return;
                }

                const activeLevel = level && cmdlines.has(level)
                    ? level
                    : Math.max(...cmdlines.keys());
                const state = cmdlines.get(activeLevel);
                if (!state) {
                    cmdlineEl.style.display = "none";
                    cmdlineEl.innerHTML = "";
                    cmdlineEl.dataset.wrapPrompt = "0";
                    updateOverlayLayout();
                    return;
                }

                const prefix = `${state.firstc || ""}${state.prompt || ""}${" ".repeat(Math.max(0, state.indent || 0))}`;
                const special = state.specialChar || "";
                const body = state.text || "";
                const bodyCursor = Math.max(0, Math.min(body.length, state.pos || 0));
                let combined = body;
                if (special) {
                    combined = state.specialShift
                        ? body.slice(0, bodyCursor) + special + body.slice(bodyCursor)
                        : body.slice(0, bodyCursor) + special + body.slice(Math.min(body.length, bodyCursor + 1));
                }
                const cursorPos = Math.max(0, Math.min(combined.length, bodyCursor));
                const fullText = prefix + combined;
                const cursorIndex = Math.max(0, Math.min(fullText.length, prefix.length + cursorPos));
                const wrapPrompt = !state.firstc && !!state.prompt && !body;

                cmdlineEl.dataset.wrapPrompt = wrapPrompt ? "1" : "0";
                cmdlineEl.style.whiteSpace = wrapPrompt ? "pre-wrap" : "pre";
                cmdlineEl.style.height = wrapPrompt ? "auto" : `${cellH}px`;
                cmdlineEl.style.minHeight = `${cellH}px`;
                cmdlineEl.style.overflow = wrapPrompt ? "visible" : "hidden";
                cmdlineEl.style.overflowWrap = wrapPrompt ? "anywhere" : "normal";
                cmdlineEl.style.width = "auto";
                cmdlineEl.style.maxWidth = "none";

                if (fullText.length === 0) {
                    cmdlineEl.innerHTML = '<span class="cmdline-cursor">&nbsp;</span>';
                    cmdlineEl.style.display = "block";
                    updateOverlayLayout();
                    return;
                }

                const before = escapeHtml(fullText.slice(0, cursorIndex));
                const cursorChar = escapeHtml(fullText[cursorIndex] ?? " ");
                const after = escapeHtml(fullText.slice(cursorIndex + 1));
                cmdlineEl.innerHTML = `${before}<span class="cmdline-cursor">${cursorChar === " " ? "&nbsp;" : cursorChar}</span>${after}`;
                cmdlineEl.style.display = "block";
                updateOverlayLayout();
            }

            function refreshCmdlineBlock() {
                if (!cmdblockEl) return;

                if (cmdlineBlock.length === 0) {
                    cmdblockEl.style.display = "none";
                    cmdblockEl.innerHTML = "";
                    updateOverlayLayout();
                    return;
                }

                cmdblockEl.innerHTML = cmdlineBlock
                    .map(line => `<div>${escapeHtml(line)}</div>`)
                    .join("");
                cmdblockEl.style.display = "block";
                updateOverlayLayout();
            }

            function refreshMessages() {
                if (!messagesEl) return;
                messagesEl.innerHTML = "";

                const lines = [];
                for (const line of messageLines) {
                    lines.push(line && typeof line === "object" ? line.text || "" : String(line ?? ""));
                }
                if (msgShowmode) lines.push(msgShowmode);
                if (msgRuler) lines.push(msgRuler);

                const expandedLines = [];
                for (const line of lines) {
                    const parts = String(line ?? "").split("\n");
                    for (const part of parts) expandedLines.push(part);
                }

                const visibleLines = cmdlines.size > 0 ? expandedLines : expandedLines.slice(-8);
                for (const line of visibleLines) {
                    const div = document.createElement("div");
                    div.className = "msgline";
                    const text = String(line ?? "");
                    const m = /^(E\d+:\s+ATTENTION)(.*)$/.exec(text);
                    if (m) {
                        const code = document.createElement("span");
                        code.className = "msgcode error";
                        code.textContent = m[1];
                        div.appendChild(code);
                        if (m[2]) {
                            div.appendChild(document.createTextNode(m[2]));
                        }
                    } else {
                        div.textContent = text;
                    }
                    messagesEl.appendChild(div);
                }

                msgGridVisible = expandedLines.length > 0;
                updateMessagePosition();
                updateOverlayLayout();
            }

            function debugEvent(name, payload) {
                try {
                    post({ type: "debug", data: JSON.stringify({ name, payload }) });
                } catch {
                }
            }

            let overlayBottomInset = 0;

            function updateMessagePosition() {
                if (!messagesEl) return;

                if (!msgGridVisible || messagesEl.childElementCount === 0) {
                    messagesEl.style.display = "none";
                    messagesEl.style.maxHeight = "";
                    messagesEl.style.overflow = "visible";
                    return;
                }

                messagesEl.style.display = "block";
                const topInset = root.offsetTop || 0;
                if (Number.isFinite(msgGridRow)) {
                    messagesEl.style.top = `${topInset + msgGridRow * cellH}px`;
                    messagesEl.style.bottom = "auto";
                    messagesEl.style.maxHeight = "";
                    messagesEl.style.overflow = "visible";
                } else if (hasConfirmMessages()) {
                    messagesEl.style.top = "auto";
                    messagesEl.style.bottom = `${overlayBottomInset}px`;
                    messagesEl.style.maxHeight = "";
                    messagesEl.style.overflow = "visible";
                } else if (cmdlines.size > 0 || cmdlineBlock.length > 0) {
                    messagesEl.style.top = "auto";
                    messagesEl.style.bottom = `${overlayBottomInset}px`;
                    messagesEl.style.maxHeight = "";
                    messagesEl.style.overflow = "visible";
                } else {
                    const row = Math.max(0, rows - Math.max(1, messagesEl.childElementCount));
                    messagesEl.style.top = `${topInset + row * cellH}px`;
                    messagesEl.style.bottom = "auto";
                    messagesEl.style.maxHeight = "";
                    messagesEl.style.overflow = "visible";
                }
            }

            function renderTabline(state) {
                if (!tablineEl) return;

                const tabs = Array.isArray(state?.tabs) ? state.tabs : [];
                if (tabs.length === 0) {
                    tablineEl.style.display = "none";
                    tablineEl.innerHTML = "";
                    updateOverlayLayout();
                    return;
                }

                tablineEl.innerHTML = tabs.map(tab => {
                    const cls = ["tabitem"];
                    if (tab.current) cls.push("current");
                    if (tab.changed) cls.push("modified");
                    const label = escapeHtml(tab.label || String(tab.index || ""));
                    const badge = escapeHtml(tabBadge(tab.label || String(tab.index || "")));
                    return `<span class="${cls.join(" ")}" data-index="${tab.index}"><span class="tabicon">${badge}</span><span class="tablabel">${label}</span><button class="tabclose" data-index="${tab.index}" type="button">x</button></span>`;
                }).join("");
                tablineEl.style.display = "block";

                tablineEl.querySelectorAll(".tabitem").forEach(el => {
                    el.addEventListener("click", (ev) => {
                        if (ev.target && ev.target.closest(".tabclose")) return;
                        const index = Number(el.getAttribute("data-index") || 0);
                        if (index > 0) post({ type: "tabSwitch", index });
                    });
                });
                tablineEl.querySelectorAll(".tabclose").forEach(el => {
                    el.addEventListener("click", (ev) => {
                        ev.preventDefault();
                        ev.stopPropagation();
                        const index = Number(el.getAttribute("data-index") || 0);
                        if (index > 0) post({ type: "tabClose", index });
                    });
                });

                updateOverlayLayout();
            }

            function getPopupmenuAnchorPosition(gridId, row, col) {
                if (gridId === -1 && cmdlineEl && cmdlineEl.style.display !== "none") {
                    const rect = cmdlineEl.getBoundingClientRect();
                    return { x: rect.left + col * cellW, y: rect.top + row * cellH };
                }

                const gs = getGridState(gridId) || getGridState(1) || { x: 0, y: 0 };
                const rootRect = root.getBoundingClientRect();
                return {
                    x: rootRect.left + (gs.x || 0) + col * cellW,
                    y: rootRect.top + (gs.y || 0) + row * cellH
                };
            }

            function renderPopupmenu() {
                if (!popupmenuEl) return;
                if (!popupmenuState || !Array.isArray(popupmenuState.items) || popupmenuState.items.length === 0) {
                    popupmenuEl.style.display = "none";
                    popupmenuEl.innerHTML = "";
                    return;
                }

                popupmenuEl.innerHTML = popupmenuState.items.map((item, index) => {
                    const cls = index === popupmenuState.selected ? "pumitem selected" : "pumitem";
                    return `<div class="${cls}"><span>${escapeHtml(item.word || "")}</span><span class="pum-kind">${escapeHtml(item.kind || "")}</span><span class="pum-extra">${escapeHtml(item.menu || "")}</span></div>`;
                }).join("");
                popupmenuEl.style.display = "block";

                const anchor = getPopupmenuAnchorPosition(popupmenuState.grid, popupmenuState.row, popupmenuState.col);
                const desiredLeft = Math.max(0, Math.min(window.innerWidth - popupmenuEl.offsetWidth - 4, anchor.x));
                let desiredTop = anchor.y + cellH;
                if (desiredTop + popupmenuEl.offsetHeight > window.innerHeight) {
                    desiredTop = Math.max(0, anchor.y - popupmenuEl.offsetHeight);
                }

                popupmenuEl.style.left = `${desiredLeft}px`;
                popupmenuEl.style.top = `${Math.max(0, desiredTop)}px`;
                const selectedEl = popupmenuEl.querySelector(".pumitem.selected");
                if (selectedEl && typeof selectedEl.scrollIntoView === "function") {
                    selectedEl.scrollIntoView({ block: "nearest" });
                }
                const rootRect = root.getBoundingClientRect();
                post({
                    type: "pumBounds",
                    x: desiredLeft,
                    y: Math.max(0, desiredTop),
                    width: popupmenuEl.offsetWidth,
                    height: popupmenuEl.offsetHeight,
                    pumCol: (desiredLeft - rootRect.left) / Math.max(1, cellW),
                    pumRow: (Math.max(0, desiredTop) - rootRect.top) / Math.max(1, cellH)
                });
            }

            function updateOverlayLayout() {
                const tablineVisible = !!tablineEl && tablineEl.style.display !== "none" && tablineEl.innerHTML !== "";
                const cmdlineVisible = !!cmdlineEl && cmdlineEl.style.display !== "none" && cmdlineEl.innerHTML !== "";
                const cmdblockVisible = !!cmdblockEl && cmdblockEl.style.display !== "none" && cmdblockEl.innerHTML !== "";
                const rootRect = root.getBoundingClientRect();
                const overlayLeft = Math.max(0, Math.round(rootRect.left));
                const overlayWidth = Math.max(1, Math.round(rootRect.width || window.innerWidth));

                const tablineHeight = tablineVisible ? Math.ceil(tablineEl.offsetHeight) : 0;
                const cmdlineHeight = cmdlineVisible ? Math.ceil(cmdlineEl.offsetHeight) : 0;
                const cmdblockHeight = cmdblockVisible ? Math.ceil(cmdblockEl.offsetHeight) : 0;

                if (messagesEl) {
                    messagesEl.style.left = `${overlayLeft}px`;
                    messagesEl.style.right = "auto";
                    messagesEl.style.width = `${overlayWidth}px`;
                    messagesEl.style.maxWidth = `${overlayWidth}px`;
                }
                if (cmdlineEl) {
                    cmdlineEl.style.left = `${overlayLeft}px`;
                    cmdlineEl.style.right = "auto";
                    cmdlineEl.style.width = `${overlayWidth}px`;
                    cmdlineEl.style.maxWidth = `${overlayWidth}px`;
                }
                if (cmdblockEl) {
                    cmdblockEl.style.left = `${overlayLeft}px`;
                    cmdblockEl.style.right = "auto";
                    cmdblockEl.style.width = `${overlayWidth}px`;
                    cmdblockEl.style.maxWidth = `${overlayWidth}px`;
                }
                if (cmdlineEl && cmdlineEl.dataset.wrapPrompt !== "1") cmdlineEl.style.height = `${cellH}px`;
                if (cmdblockEl) cmdblockEl.style.lineHeight = `${cellH}px`;
                if (cmdlineEl) cmdlineEl.style.bottom = "1px";
                if (cmdblockEl) cmdblockEl.style.bottom = `${cmdlineHeight + 1}px`;

                const nextTopInset = tablineHeight;
                if (nextTopInset !== tablineTopInset) {
                    tablineTopInset = nextTopInset;
                    root.style.top = `${tablineTopInset}px`;
                    onResize();
                }
                root.style.bottom = "0px";
                overlayBottomInset = cmdlineHeight + cmdblockHeight;

                updateMessagePosition();
                renderPopupmenu();
            }

            // --- rendering ---
            let paintPending = false;

            function schedulePaint() {
                if (paintPending) return;
                paintPending = true;
                requestAnimationFrame(() => {
                    paintPending = false;
                    paint();
                });
            }

            function getHighlightAttrs(hlId) {
                const a = hl.get(hlId) || {};

                let fg = a.fg || defFg;
                let bg = a.bg || defBg;

                if (a.reverse) {
                    const tmp = fg;
                    fg = bg;
                    bg = tmp;
                }

                return {
                    fg,
                    bg,
                    bold: !!a.bold,
                    italic: !!a.italic,
                    underline: !!a.underline,
                    undercurl: !!a.undercurl,
                    special: a.special || fg
                };
            }

            function getColors(hlId) {
                const { fg, bg } = getHighlightAttrs(hlId);
                return { fg, bg };
            }

            function normalizeHexColor(value) {
                return String(value || "").trim().toLowerCase();
            }

            function readableFgForBg(bg) {
                const color = normalizeHexColor(bg);
                if (!/^#[0-9a-f]{6}$/.test(color)) return defFg;
                const r = parseInt(color.slice(1, 3), 16);
                const g = parseInt(color.slice(3, 5), 16);
                const b = parseInt(color.slice(5, 7), 16);
                const luminance = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
                return luminance > 0.5 ? "#000000" : "#ffffff";
            }

            function readableFg(fg, bg) {
                if (normalizeHexColor(fg) !== normalizeHexColor(bg)) return fg || defFg;
                if (normalizeHexColor(defFg) !== normalizeHexColor(bg)) return defFg;
                return readableFgForBg(bg);
            }

            function setCtxFont(attrs) {
                const style = attrs.italic ? "italic" : "normal";
                const weight = attrs.bold ? "bold" : "normal";
                ctx.font = `${style} ${weight} ${fontSize}px ${fontFamily}`;
            }

            function drawCellText(ch, x, y, fg, attrs) {
                const baselineY = y + textYOffset;
                ctx.save();
                setCtxFont(attrs || {});
                ctx.fillStyle = fg;
                ctx.fillText(ch, x, baselineY);
                ctx.restore();
            }

            function drawCellDecorations(x, y, width, attrs) {
                if (!attrs || (!attrs.underline && !attrs.undercurl)) return;

                const uy = y + cellH - 2;
                ctx.save();
                ctx.strokeStyle = attrs.special || attrs.fg || defFg;
                ctx.lineWidth = 1;

                if (attrs.undercurl) {
                    ctx.beginPath();
                    const amp = Math.max(1, Math.floor(cellH / 10));
                    const wave = Math.max(4, Math.floor(cellW / 2));
                    let px = x;
                    let up = true;
                    ctx.moveTo(px, uy);
                    while (px < x + width) {
                        const nx = Math.min(px + wave / 2, x + width);
                        ctx.lineTo(nx, uy + (up ? -amp : amp));
                        px = nx;
                        up = !up;
                    }
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(x, uy);
                    ctx.lineTo(x + width, uy);
                    ctx.stroke();
                }

                ctx.restore();
            }

            function paint() {
                const w = root.clientWidth;
                const h = root.clientHeight;

                ctx.font = `${fontSize}px ${fontFamily}`;
                ctx.textBaseline = "alphabetic";
                ctx.direction = "ltr";

                ctx.fillStyle = defBg;
                ctx.fillRect(0, 0, w, h);

                const paintGrid = (gs) => {
                    if (!gs) return;
                    const gx = Math.round(gs.x || 0);
                    const gy = Math.round(gs.y || 0);
                    const visibleCols = Math.max(0, Math.min(gs.cols, gs.outerCols || gs.cols));
                    const visibleRows = Math.max(0, Math.min(gs.rows, gs.outerRows || gs.rows));

                    if (gs.floating && !gs.overlayManaged && visibleCols > 0 && visibleRows > 0) {
                        let sampleBg = null;
                        for (let sr = 0; sr < visibleRows && !sampleBg; sr++) {
                            for (let sc = 0; sc < visibleCols; sc++) {
                                const sample = gs.cells[sr]?.[sc];
                                if (!sample) continue;
                                const colors = getColors(sample.hl);
                                if (colors.bg && colors.bg !== defBg) {
                                    sampleBg = colors.bg;
                                    break;
                                }
                            }
                        }
                        ctx.fillStyle = sampleBg || defBg;
                        ctx.fillRect(gx, gy, visibleCols * cellW, visibleRows * cellH);
                    }

                    for (let r = 0; r < visibleRows; r++) {
                        const y = gy + r * cellH;
                        if (y >= h || y + cellH <= 0) continue;

                        for (let c = visibleCols - 1; c >= 0; c--) {
                            const x = gx + c * cellW;
                            if (x >= w) continue;
                            if (x + cellW <= 0) continue;

                            const cell = gs.cells[r][c];
                            const { bg } = getColors(cell.hl);

                            ctx.fillStyle = bg || defBg;
                            ctx.fillRect(x, y, cellW, cellH);
                        }

                        for (let c = 0; c < visibleCols; c++) {
                            const x = gx + c * cellW;
                            if (x >= w) break;
                            if (x + cellW <= 0) continue;

                            const cell = gs.cells[r][c];
                            const attrs = getHighlightAttrs(cell.hl);
                            const { bg } = getColors(cell.hl);
                            const ch = cell.ch || "";

                            if (!ch || ch === " ") continue;

                            drawCellText(ch, x, y, readableFg(attrs.fg, bg), attrs);
                            drawCellDecorations(x, y, cellW, attrs);
                        }
                    }
                };

                for (const gs of eachVisibleGridInPaintOrder()) {
                    paintGrid(gs);
                }

                const cgs = getGridState(cursor.grid || 1) || getGridState(1);
                if (cgs && cursorVisible) {
                    const cx = Math.round((cgs.x || 0) + cursor.c * cellW);
                    const cy = Math.round((cgs.y || 0) + cursor.r * cellH);

                    if (cx < w && cy < h && cursor.r >= 0 && cursor.r < cgs.rows && cursor.c >= 0 && cursor.c < cgs.cols) {
                        const cell = cgs.cells[cursor.r][cursor.c] || { ch: " ", hl: 0, cont: false };
                        const attrs = getHighlightAttrs(cell.hl);
                        const ch = cell.ch || " ";

                        let cursorW = cellW;
                        if (ch && ch !== " ") {
                            const measuredW = ctx.measureText(ch).width;
                            cursorW = Math.max(cellW, Math.min(Math.ceil(measuredW), cellW * 2));
                        }
                        cursorW = Math.min(cursorW, w - cx);

                        if (currentCursorShape === "vertical") {
                            const cw = Math.max(1, Math.round((cellW * currentCellPercentage) / 100));
                            ctx.fillStyle = attrs.fg || defFg;
                            ctx.fillRect(cx, cy, cw, cellH);

                            if (ch !== " ") {
                                drawCellText(ch, cx, cy, attrs.fg || defFg, attrs);
                                drawCellDecorations(cx, cy, cursorW, attrs);
                            }
                        } else if (currentCursorShape === "horizontal") {
                            const chh = Math.max(1, Math.round((cellH * currentCellPercentage) / 100));
                            ctx.fillStyle = attrs.fg || defFg;
                            ctx.fillRect(cx, cy + (cellH - chh), cursorW, chh);

                            if (ch !== " ") {
                                drawCellText(ch, cx, cy, attrs.fg || defFg, attrs);
                                drawCellDecorations(cx, cy, cursorW, attrs);
                            }
                        } else {
                            ctx.fillStyle = attrs.fg || defFg;
                            ctx.fillRect(cx, cy, cursorW, cellH);

                            if (ch !== " ") {
                                const cursorAttrs = {
                                    ...attrs,
                                    fg: attrs.bg || defBg,
                                    bg: attrs.fg || defFg,
                                    special: attrs.special || attrs.bg || defBg
                                };
                                drawCellText(ch, cx, cy, cursorAttrs.fg || defBg, cursorAttrs);
                                drawCellDecorations(cx, cy, cursorW, cursorAttrs);
                            }
                        }
                    }
                }

                syncImePosition();

                if (!gotAnyRedraw) {
                    drawCellText("Waiting for Neovim redraw…", 8, 8, "rgba(255,255,255,0.7)", { italic: false, bold: false, underline: false, undercurl: false, special: "rgba(255,255,255,0.7)" });
                }
            }

            function cellSpanForChar(ch) {
                if (!ch || ch === " ") return 1;
                const w = ctx.measureText(ch).width;
                return (w > cellW * 1.35) ? 2 : 1;
            }

            function syncImePosition() {
                const cgs = getGridState(cursor.grid || 1) || getGridState(1) || { x: 0, y: 0 };
                const x = Math.max(0, Math.min(root.clientWidth - cellW, (cgs.x || 0) + cursor.c * cellW));
                const y = Math.max(0, Math.min(root.clientHeight - cellH, (cgs.y || 0) + cursor.r * cellH));

                const composingText = ime.value || "";
                const measured = composingText ? ctx.measureText(composingText).width : 0;
                const desiredWidth = Math.max(
                    cellW * 2,
                    Math.ceil(measured) + cellW * 2,
                    24
                );

                const maxWidth = Math.max(24, root.clientWidth - x - 4);
                const actualWidth = Math.min(desiredWidth, maxWidth);

                ime.style.left = `${x}px`;
                ime.style.top = `${y}px`;
                ime.style.width = `${actualWidth}px`;
                ime.style.height = `${cellH}px`;
                ime.style.font = `${fontSize}px ${fontFamily}`;
                ime.style.lineHeight = `${cellH}px`;
            }

            function setImeComposingVisual(active) {
                if (active) {
                    ime.classList.add("composing");
                } else {
                    ime.classList.remove("composing");
                }
            }

            function applyModeCursor(modeName) {
                currentModeName = modeName || currentModeName;

                const info = modeInfos.find(m => m && m.name === currentModeName);
                if (!info) {
                    currentCursorShape = "block";
                    currentCellPercentage = 25;
                    return;
                }

                currentCursorShape = info.cursor_shape || "block";
                currentCellPercentage = (typeof info.cell_percentage === "number")
                    ? info.cell_percentage
                    : (currentCursorShape === "block" ? 100 : 25);
            }

            function isNormalLikeMode(modeName) {
                const m = String(modeName || "").toLowerCase();

                // normal / normal busy / cmdline normal などを広めに拾う
                return m === "normal"
                    || m === "normal_busy"
                    || m === "normal_busy_operator_pending"
                    || m === "normal_operator_pending"
                    || m === "command"
                    || m === "cmdline_normal";
            }

            function notifyImeOffIfNeeded(modeName) {
                if (isNormalLikeMode(modeName)) {
                    post({ type: "imeOff" });
                }
            }

            function getModifierString(e) {
                const mods = [];
                if (e.shiftKey) mods.push("S");
                if (e.ctrlKey) mods.push("C");
                if (e.altKey) mods.push("A");
                return mods.join("-");
            }

            function eventToGridPos(e) {
                const rect = cv.getBoundingClientRect();
                const px = Math.max(0, e.clientX - rect.left);
                const py = Math.max(0, e.clientY - rect.top);

                const ordered = eachVisibleGridInPaintOrder().slice().sort((a, b) => (b.z || 0) - (a.z || 0));
                for (const gs of ordered) {
                    const gx = gs.x || 0;
                    const gy = gs.y || 0;
                    const gw = Math.max(0, Math.min(gs.cols, gs.outerCols || gs.cols)) * cellW;
                    const gh = Math.max(0, Math.min(gs.rows, gs.outerRows || gs.rows)) * cellH;

                    if (px >= gx && px < gx + gw && py >= gy && py < gy + gh) {
                        const col = Math.max(0, Math.min(gs.cols - 1, Math.floor((px - gx) / cellW)));
                        const row = Math.max(0, Math.min(gs.rows - 1, Math.floor((py - gy) / cellH)));
                        return { grid: gs.id, row, col };
                    }
                }

                const col = Math.max(0, Math.min(cols - 1, Math.floor(px / cellW)));
                const row = Math.max(0, Math.min(rows - 1, Math.floor(py / cellH)));
                return { grid: 1, row, col };
            }

            function postMouse(button, action, e) {
                const pos = eventToGridPos(e);
                post({
                    type: "mouse",
                    button,
                    action,
                    modifiers: getModifierString(e),
                    grid: pos.grid,
                    row: pos.row,
                    col: pos.col
                });
            }

            function scheduleNvimRedraw() {
                if (redrawKickTimer) return;

                redrawKickTimer = window.setTimeout(() => {
                    redrawKickTimer = 0;
                    post({ type: "command", data: "redraw!" });
                }, 80);
            }

            function normalizeArg(a) {
                return Array.isArray(a) ? a : [a];
            }

            function applyRedraw(events) {
                gotAnyRedraw = true;

                for (const upd of events) {
                    if (!Array.isArray(upd) || upd.length === 0) continue;
                    const name = upd[0];
                    const args = upd.slice(1);

                    switch (name) {
                        case "default_colors_set": {
                            deferredPaintNeeded = true;
                            for (const item of args) {
                                const a = normalizeArg(item);
                                const fg = rgbIntToHex(a[0]);
                                const bg = rgbIntToHex(a[1]);

                                if (fg) defFg = fg;
                                if (bg) defBg = bg;
                            }

                            document.documentElement.style.setProperty("--bg", defBg);
                            document.documentElement.style.setProperty("--fg", defFg);
                            root.style.backgroundColor = defBg;
                            post({ type: "colors", bg: defBg, fg: defFg });
                            break;
                        }

                        case "hl_attr_define": {
                            deferredPaintNeeded = true;
                            for (const item of args) {
                                const a = normalizeArg(item);
                                const id = a[0];
                                const rgbAttrs = a[1] || {};

                                const fg = rgbIntToHex(rgbAttrs.foreground);
                                const bg = rgbIntToHex(rgbAttrs.background);
                                const sp = rgbIntToHex(rgbAttrs.special);
                                const reverse = !!rgbAttrs.reverse;
                                const bold = !!rgbAttrs.bold;
                                const italic = !!rgbAttrs.italic;
                                const underline = !!rgbAttrs.underline;
                                const undercurl = !!rgbAttrs.undercurl;

                                hl.set(id, { fg, bg, reverse, bold, italic, underline, undercurl, special: sp });
                            }
                            break;
                        }

                        case "grid_resize": {
                            deferredPaintNeeded = true;
                            for (const item of args) {
                                const a = normalizeArg(item);
                                if (a.length < 3) continue;
                                allocGrid(a[1], a[2], a[0]);
                            }
                            break;
                        }

                        case "grid_clear": {
                            deferredPaintNeeded = true;

                                if (!gs) continue;
                                const top = a[1];
                                const bot = a[2];
                                const left = a[3];
                                const right = a[4];
                                const rowsDelta = a[5];
                                const colsDelta = a[6];
                                const delta = rowsDelta;

                                if (colsDelta !== 0) {

                                    continue;

                                if (delta === 0) continue;

                                if (delta > 0) {
                                    for (let r = top; r < bot - delta; r++) {
                                        for (let c = left; c < right; c++) {
                                            const src = gs.cells[r + delta][c];
                                            gs.cells[r][c] = { ch: src.ch, hl: src.hl, cont: !!src.cont };
                                        }
                                    }
                                    for (let r = bot - delta; r < bot; r++) {
                                        for (let c = left; c < right; c++) {

                                        }
                                    }
                                } else {
                                    const d = -delta;
                                    for (let r = bot - 1; r >= top + d; r--) {
                                        for (let c = left; c < right; c++) {
                                            const src = gs.cells[r - d][c];
                                            gs.cells[r][c] = { ch: src.ch, hl: src.hl, cont: !!src.cont };
                                        }
                                    }
                                    for (let r = top; r < top + d; r++) {
                                        for (let c = left; c < right; c++) {

                                if (!Array.isArray(cells)) continue;
                                if (row < 0 || row >= gs.rows) continue;

                                let lastHl = (colStart > 0 && colStart - 1 < gs.cols) ? gs.cells[row][colStart - 1].hl : 0;
                                let debugText = "";

                                for (const cell of cells) {
                                    if (!Array.isArray(cell) || cell.length < 1) continue;

                                    const text = String(cell[0] ?? "");
                                    const hlId = (cell.length >= 2 && cell[1] != null) ? cell[1] : lastHl;
                                    const repeat = (cell.length >= 3 && cell[2] != null) ? cell[2] : 1;

                                    lastHl = hlId;
                                    const chars = [...text];
                                    debugText += text.repeat(Math.max(1, Number(repeat) || 1));

                                                gs.cells[row][col].hl = hlId;

                                        }

                        case "msg_show": {

                                        transient: false
                                    }];

                                    const idx = messageLines.findIndex(line => line && typeof line === "object" && line.id === id);
                                    if (idx >= 0) {
                                        const prevText = messageLines[idx].text || "";
                                        messageLines[idx] = {
                                            ...messageLines[idx],

                                            text: append ? prevText + content : content,

                                    messageLines[messageLines.length - 1] = {

                                        text: append ? prevText + content : content,
                                        kind,
                                        transient: kind === "emsg" || kind === "echoerr"
                                    };

                                        text: content,
                                        kind,
                                        transient: kind === "emsg" || kind === "echoerr"
                                    });

                            msgGridRow = null;

                }
            }

            // --- input ---
            const SPECIAL = new Map([
                ["Enter", "<CR>"],
                ["Backspace", "<BS>"],
                ["Tab", "<Tab>"],
                ["Escape", "<Esc>"],
                ["ArrowLeft", "<Left>"],
                ["ArrowRight", "<Right>"],
                ["ArrowUp", "<Up>"],
                ["ArrowDown", "<Down>"],
                ["Home", "<Home>"],
                ["End", "<End>"],
                ["PageUp", "<PageUp>"],
                ["PageDown", "<PageDown>"],
                ["Delete", "<Del>"],
                ["Insert", "<Insert>"]
            ]);

            function keyToVim(e) {
                if (e.key.startsWith("F") && /^\d+$/.test(e.key.substring(1))) {
                    return { data: `<${e.key}>`, termcode: true };
                }

                if (SPECIAL.has(e.key)) {
                    if (e.key === "Tab" && e.shiftKey) {
                        return { data: "<S-Tab>", termcode: true };
                    }
                    return { data: SPECIAL.get(e.key), termcode: true };
                }

                if (e.ctrlKey && !e.altKey && e.key.length === 1) {
                    return { data: `<C-${e.key.toLowerCase()}>`, termcode: true };
                }

                if (e.altKey && !e.ctrlKey && e.key.length === 1) {
                    return { data: `<M-${e.key.toLowerCase()}>`, termcode: true };
                }

                if (!e.ctrlKey && !e.altKey && e.key.length === 1) {
                    return { data: e.key, termcode: false };
                }

                return null;
            }

            // クリックでIME用textareaにフォーカス
            root.addEventListener("pointerdown", (e) => {
                post({ type: "editorPointerDown" });

                if (e.button === 0) {
                    mouseLeftDown = true;
                    postMouse("left", "press", e);
                } else if (e.button === 1) {
                    postMouse("middle", "press", e);
                } else if (e.button === 2) {
                    postMouse("right", "press", e);
                }

                setTimeout(() => {
                    syncImePosition();
                    ime.focus();
                }, 0);

                setTimeout(() => {
                    syncImePosition();
                    ime.focus();
                }, 150);

                e.preventDefault();
            }, { passive: false });

            root.addEventListener("pointerup", (e) => {
                if (e.button === 0) {
                    mouseLeftDown = false;
                    postMouse("left", "release", e);
                } else if (e.button === 1) {
                    postMouse("middle", "release", e);
                } else if (e.button === 2) {
                    postMouse("right", "release", e);
                }

                scheduleNvimRedraw();
                e.preventDefault();
            }, { passive: false });

            root.addEventListener("pointermove", (e) => {
                if (!mouseLeftDown) return;
                postMouse("left", "drag", e);
                scheduleNvimRedraw();
                e.preventDefault();
            }, { passive: false });

            root.addEventListener("pointercancel", (e) => {
                if (!mouseLeftDown) return;
                mouseLeftDown = false;
                postMouse("left", "release", e);
                scheduleNvimRedraw();
            }, { passive: true });

            ime.addEventListener("compositionstart", () => {
                composing = true;
                suppressNextInputText = null;
                setImeComposingVisual(true);
                syncImePosition();
            });

            ime.addEventListener("compositionupdate", () => {
                setImeComposingVisual(true);
                syncImePosition();
            });

            ime.addEventListener("compositionend", (e) => {
                composing = false;
                setImeComposingVisual(false);

                const text = (e.data ?? ime.value ?? "");
                if (text) {
                    suppressNextInputText = text;
                    post({ type: "input", data: text, termcode: false });
                }

                ime.value = "";
                syncImePosition();
            });

            ime.addEventListener("input", () => {
                if (composing) return;

                const v = ime.value || "";
                if (!v) {
                    ime.value = "";
                    syncImePosition();
                    return;
                }

                if (suppressNextInputText !== null && v === suppressNextInputText) {
                    suppressNextInputText = null;
                    ime.value = "";
                    syncImePosition();
                    return;
                }

                suppressNextInputText = null;
                post({ type: "input", data: v, termcode: false });
                ime.value = "";
                syncImePosition();
            });

            ime.addEventListener("keydown", (e) => {
                if (composing || e.isComposing) return;

                const k = keyToVim(e);
                if (!k) return;

                e.preventDefault();
                e.stopPropagation();
                post({ type: "input", data: k.data, termcode: k.termcode });
            }, { passive: false });

            root.addEventListener("wheel", (e) => {
                e.preventDefault();

                if (Math.abs(e.deltaY) >= Math.abs(e.deltaX)) {
                    postMouse("wheel", e.deltaY < 0 ? "up" : "down", e);
                } else {
                    postMouse("wheel", e.deltaX < 0 ? "left" : "right", e);
                }

                scheduleNvimRedraw();
            }, { passive: false });

            root.addEventListener("contextmenu", (e) => {
                e.preventDefault();
            }, { passive: false });

            function onResize() {
                updateMetrics();
                const cr = calcColsRows();
                if (cr.cols !== cols || cr.rows !== rows) {
                    allocGrid(cr.cols, cr.rows, 1);
                    post({ type: "resize", cols: cr.cols, rows: cr.rows });
                }
                schedulePaint();
            }

            // start
            updateMetrics();
            const cr = calcColsRows();
            allocGrid(cr.cols, cr.rows, 1);
            schedulePaint();
            post({ type: "ready", cols: cr.cols, rows: cr.rows });
            setTimeout(() => {
                syncImePosition();
                ime.focus();
            }, 0);

            try {
                new ResizeObserver(onResize).observe(root);
            } catch {
                window.addEventListener("resize", onResize);
            }

            window.chrome.webview.addEventListener("message", (ev) => {
                let msg;
                try {
                    msg = JSON.parse(ev.data);
                } catch {
                    return;
                }

                if (msg.type === "bootError" && msg.message) {
                    showErr(String(msg.message));
                    return;
                }

                if (msg.type === "redrawBatch" && Array.isArray(msg.batches)) {
                    try {
                        const merged = [];
                        for (const evs of msg.batches) {
                            if (Array.isArray(evs)) {
                                for (const ev of evs) merged.push(ev);
                            }
                        }
                        applyRedraw(merged);
                    } catch (e) {
                        showErr("applyRedraw failed: " + e + "\n" + (e && e.stack ? e.stack : ""));
                    }
                    return;
                }

                if (msg.type === "redraw" && msg.events) {
                    try {
                        applyRedraw(msg.events);
                    } catch (e) {
                        showErr("applyRedraw failed: " + e + "\n" + (e && e.stack ? e.stack : ""));
                    }
                }
            });
        })();
    </script>
</body>
</html>
