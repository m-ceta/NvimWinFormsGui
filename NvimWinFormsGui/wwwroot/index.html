                                drawCellDecorations(cx, cy, cursorW, attrs);
                            }
                        } else if (currentCursorShape === "horizontal") {
                            const chh = Math.max(1, Math.round((cellH * currentCellPercentage) / 100));
                            ctx.fillStyle = attrs.fg || defFg;
                            ctx.fillRect(cx, cy + (cellH - chh), cursorW, chh);

                            if (ch !== " ") {
                                drawCellText(ch, cx, cy, attrs.fg || defFg, attrs);
                                drawCellDecorations(cx, cy, cursorW, attrs);
                            }
                        } else {
                            ctx.fillStyle = attrs.fg || defFg;
                            ctx.fillRect(cx, cy, cursorW, cellH);

                            if (ch !== " ") {
                                const cursorAttrs = {
                                    ...attrs,
                                    fg: attrs.bg || defBg,
                                    bg: attrs.fg || defFg,
                                    special: attrs.special || attrs.bg || defBg
                                };
                                drawCellText(ch, cx, cy, cursorAttrs.fg || defBg, cursorAttrs);
                                drawCellDecorations(cx, cy, cursorW, cursorAttrs);
                            }
                        }
                    }
                }

                syncImePosition();

                if (!gotAnyRedraw) {
                    drawCellText("Waiting for Neovim redraw…", 8, 8, "rgba(255,255,255,0.7)", { italic: false, bold: false, underline: false, undercurl: false, special: "rgba(255,255,255,0.7)" });
                }
            }

            function cellSpanForChar(ch) {
                if (!ch || ch === " ") return 1;
                const w = ctx.measureText(ch).width;
                return (w > cellW * 1.35) ? 2 : 1;
            }

            function syncImePosition() {
                const cgs = getGridState(cursor.grid || 1) || getGridState(1) || { x: 0, y: 0 };
                const x = Math.max(0, Math.min(root.clientWidth - cellW, (cgs.x || 0) + cursor.c * cellW));
                const y = Math.max(0, Math.min(root.clientHeight - cellH, (cgs.y || 0) + cursor.r * cellH));

                const composingText = ime.value || "";
                const measured = composingText ? ctx.measureText(composingText).width : 0;
                const desiredWidth = Math.max(
                    cellW * 2,
                    Math.ceil(measured) + cellW * 2,
                    24
                );

                const maxWidth = Math.max(24, root.clientWidth - x - 4);
                const actualWidth = Math.min(desiredWidth, maxWidth);

                ime.style.left = `${x}px`;
                ime.style.top = `${y}px`;
                ime.style.width = `${actualWidth}px`;
                ime.style.height = `${cellH}px`;
                ime.style.font = `${fontSize}px ${fontFamily}`;
                ime.style.lineHeight = `${cellH}px`;
            }

            function setImeComposingVisual(active) {
                if (active) {
                    ime.classList.add("composing");
                } else {
                    ime.classList.remove("composing");
                }
            }

            function applyModeCursor(modeName) {
                currentModeName = modeName || currentModeName;

                const info = modeInfos.find(m => m && m.name === currentModeName);
                if (!info) {
                    currentCursorShape = "block";
                    currentCellPercentage = 25;
                    return;
                }

                currentCursorShape = info.cursor_shape || "block";
                currentCellPercentage = (typeof info.cell_percentage === "number")
                    ? info.cell_percentage
                    : (currentCursorShape === "block" ? 100 : 25);
            }

            function isNormalLikeMode(modeName) {
                const m = String(modeName || "").toLowerCase();

                // normal / normal busy / cmdline normal などを広めに拾う
                return m === "normal"
                    || m === "normal_busy"
                    || m === "normal_busy_operator_pending"
                    || m === "normal_operator_pending"
                    || m === "command"
                    || m === "cmdline_normal";
            }

            function notifyImeOffIfNeeded(modeName) {
                if (isNormalLikeMode(modeName)) {
                    post({ type: "imeOff" });
                }
            }

            function getModifierString(e) {
                const mods = [];
                if (e.shiftKey) mods.push("S");
                if (e.ctrlKey) mods.push("C");
                if (e.altKey) mods.push("A");
                return mods.join("-");
            }

            function hitTestGridAtPixel(px, py) {
                const ordered = eachVisibleGridInPaintOrder().slice().sort((a, b) => {
                    const z = (b.z || 0) - (a.z || 0);
                    if (z !== 0) return z;
                    if (!!a.floating !== !!b.floating) return a.floating ? -1 : 1;
                    return (b.id || 0) - (a.id || 0);
                });

                for (const gs of ordered) {
                    if (!gs || gs.visible === false) continue;
                    const gx = gs.x || 0;
                    const gy = gs.y || 0;
                    const gw = Math.max(0, Math.min(gs.cols, gs.outerCols || gs.cols)) * cellW;
                    const gh = Math.max(0, Math.min(gs.rows, gs.outerRows || gs.rows)) * cellH;
                    if (gw <= 0 || gh <= 0) continue;

                    if (px >= gx && px < gx + gw && py >= gy && py < gy + gh) {
                        const col = Math.max(0, Math.min(gs.cols - 1, Math.floor((px - gx) / Math.max(1, cellW))));
                        const row = Math.max(0, Math.min(gs.rows - 1, Math.floor((py - gy) / Math.max(1, cellH))));
                        return { grid: gs.id, row, col, floating: !!gs.floating, z: gs.z || 0 };
                    }
                }

                const col = Math.max(0, Math.min(cols - 1, Math.floor(px / Math.max(1, cellW))));
                const row = Math.max(0, Math.min(rows - 1, Math.floor(py / Math.max(1, cellH))));
                return { grid: 1, row, col, floating: false, z: 0 };
            }

            function hitTestPopupmenu(clientX, clientY) {
                if (!popupmenuEl || !popupmenuState || popupmenuEl.style.display === "none") return null;
                const rect = popupmenuEl.getBoundingClientRect();
                if (clientX < rect.left || clientX >= rect.right || clientY < rect.top || clientY >= rect.bottom) return null;

                const items = Array.isArray(popupmenuState.items) ? popupmenuState.items : [];
                if (items.length === 0) return null;

                const scrollTop = popupmenuEl.scrollTop || 0;
                const itemHeight = Math.max(1, cellH);
                const itemIndex = Math.max(0, Math.min(items.length - 1, Math.floor((clientY - rect.top + scrollTop) / itemHeight)));
                return {
                    grid: Number(popupmenuState.grid ?? 1),
                    row: Math.max(0, Number(popupmenuState.row ?? 0) + itemIndex),
                    col: Math.max(0, Number(popupmenuState.col ?? 0)),
                    popupmenu: true,
                    itemIndex
                };
            }

            function hitTestMouseTarget(e, capturedTarget = null) {
                if (capturedTarget && typeof capturedTarget.grid === "number") {
                    return capturedTarget;
                }

                const popupHit = hitTestPopupmenu(e.clientX, e.clientY);
                if (popupHit) return popupHit;

                const rect = cv.getBoundingClientRect();
                const px = Math.max(0, e.clientX - rect.left);
                const py = Math.max(0, e.clientY - rect.top);
                return hitTestGridAtPixel(px, py);
            }

            function postMouse(button, action, e, forcedTarget = null) {
                const pos = hitTestMouseTarget(e, forcedTarget);
                if (pos.popupmenu && popupmenuState && typeof pos.itemIndex === "number" && action !== "drag") {
                    popupmenuState.selected = pos.itemIndex;
                    renderPopupmenu();
                }
                post({
                    type: "mouse",
                    button,
                    action,
                    modifiers: getModifierString(e),
                    grid: pos.grid,
                    row: pos.row,
                    col: pos.col
                });
                return pos;
            }

            function scheduleNvimRedraw() {
                if (redrawKickTimer) return;

                redrawKickTimer = window.setTimeout(() => {
                    redrawKickTimer = 0;
                    post({ type: "command", data: "redraw!" });
                }, 80);
            }

            function normalizeArg(a) {
                return Array.isArray(a) ? a : [a];
            }

            function applyRedraw(events) {
                gotAnyRedraw = true;

                                if (bg) defBg = bg;

                            document.documentElement.style.setProperty("--bg", defBg);
                            document.documentElement.style.setProperty("--fg", defFg);

                        case "hl_attr_define": {
                            deferredPaintNeeded = true;
                            for (const item of args) {
                                const a = normalizeArg(item);

                                const fg = rgbIntToHex(rgbAttrs.foreground);
                                const bg = rgbIntToHex(rgbAttrs.background);
                                const sp = rgbIntToHex(rgbAttrs.special);
                                const reverse = !!rgbAttrs.reverse;
                                const bold = !!rgbAttrs.bold;
                                const italic = !!rgbAttrs.italic;
                                const underline = !!rgbAttrs.underline;
                                const undercurl = !!rgbAttrs.undercurl;
                                const underdouble = !!rgbAttrs.underdouble;
                                const underdotted = !!rgbAttrs.underdotted;
                                const underdashed = !!rgbAttrs.underdashed;
                                const strikethrough = !!rgbAttrs.strikethrough;
                                const blend = toBlend(rgbAttrs.blend);
                                const info = Array.isArray(a[3]) ? a[3] : [];

                                hl.set(id, {
                                    fg,
                                    bg,
                                    reverse,
                                    bold,
                                    italic,
                                    underline,
                                    undercurl,
                                    underdouble,
                                    underdotted,
                                    underdashed,
                                    strikethrough,
                                    special: sp,
                                    blend,
                                    info

                                debugEvent("hl_attr_define", {
                                    id,

                                    flags: {
                                        reverse,
                                        bold,
                                        italic,
                                        underline,

                        case "hl_group_set": {
                            for (const item of args) {

                        case "grid_scroll": {
                            deferredPaintNeeded = true;

                                const gs = getGridState(gridId);
                                if (!gs) continue;
                                const top = a[1];
                                const bot = a[2];
                                const left = a[3];
                                const right = a[4];
                                const rowsDelta = a[5];
                                const colsDelta = a[6];

                                if (colsDelta !== 0) {
                                    markAllDirty(gridId);
                                    continue;
                                }
                                if (delta === 0) continue;

                                if (delta > 0) {
                                    for (let r = top; r < bot - delta; r++) {
                                        for (let c = left; c < right; c++) {
                                            const src = gs.cells[r + delta][c];
                                            gs.cells[r][c] = { ch: src.ch, hl: src.hl, cont: !!src.cont };
                                        }
                                    }
                                    for (let r = bot - delta; r < bot; r++) {
                                        for (let c = left; c < right; c++) {
                                            gs.cells[r][c] = { ch: " ", hl: 0, cont: false };
                                        }
                                    }
                                } else {
                                    const d = -delta;
                                    for (let r = bot - 1; r >= top + d; r--) {
                                        for (let c = left; c < right; c++) {
                                            const src = gs.cells[r - d][c];
                                            gs.cells[r][c] = { ch: src.ch, hl: src.hl, cont: !!src.cont };
                                        }
                                    }
                                    for (let r = top; r < top + d; r++) {
                                        for (let c = left; c < right; c++) {
                                            gs.cells[r][c] = { ch: " ", hl: 0, cont: false };
                                        }
                                    }
                                }

                                markAllDirty(gridId);
                            }
                            break;

                                if (a.length < 4) continue;

                                const gs = getGridState(gridId);
                                if (!gs) continue;

                                const row = a[1];
                                const colStart = a[2];
                                markDirtyRow(row, gridId);

                                const cells = a[3];
                                if (!Array.isArray(cells)) continue;
                                if (row < 0 || row >= gs.rows) continue;
                                let cellCount = 0;

                                let col = colStart;
                                let lastHl = (colStart > 0 && colStart - 1 < gs.cols) ? gs.cells[row][colStart - 1].hl : 0;
                                let debugText = "";

                                for (const cell of cells) {

                                    const text = String(cell[0] ?? "");
                                    const hlId = (cell.length >= 2 && cell[1] != null) ? cell[1] : lastHl;

                                        if (chars.length === 0) {

                                                gs.cells[row][col].hl = hlId;

                                                gs.cells[row][col].hl = hlId;
                                                gs.cells[row][col].cont = false;
                                            }
                                            col++;
                                        }
                                    }
                                }

                                        screenRow: gs.screenRow,
                                        screenCol: gs.screenCol,
                                        text: debugText,
                                        raw: cells
                                    });
                                }
                            }
                            break;
                        }


                        case "win_pos": {

                                gs.viewportMargins = {

                                    right: Number(a[5] ?? 0)
                                };
                                markAllDirty(gridId);
                                if (prevMargins.top !== gs.viewportMargins.top

                                    || prevMargins.left !== gs.viewportMargins.left

                        case "win_float_pos": {
                            deferredPaintNeeded = true;

                                const gridId = a[0];

                                const anchorGrid = Number(a[3] ?? 1);
                                const anchorRow = Number(a[4] ?? 0);

                                const focusable = !!a[6];

                                const screenCol = Number(a[10] ?? Number.NaN);

                                gs.anchor = anchor;
                                gs.anchorGrid = anchorGrid;
                                gs.anchorRow = anchorRow;
                                gs.anchorCol = anchorCol;
                                gs.outerCols = gs.cols;

                            for (const item of args) {

                        case "msg_show": {
                            let pendingConfirm = null;
                            for (const item of args) {
                                const a = normalizeArg(item);
                                const kind = String(a[0] ?? "");
                                const chunks = normalizeMessageChunks(a[1], kind);
                                const content = chunks.map(chunk => chunk.text).join("");
                                const replaceLast = !!a[2];
                                const append = !!a[4];
                                const id = a[5] == null ? null : String(a[5]);

                                debugEvent("msg_show", {

                                    kind,

                                    append,
                                    id
                                });

                                if (kind === "confirm" && (pendingConfirm || hasExistingConfirm || isSwapfileConfirmText(content))) {

                                            line && typeof line === "object" && line.kind === "confirm");
                                        pendingConfirm = {

                                            text: prevConfirm && typeof prevConfirm === "object"
                                                ? String(prevConfirm.text || "")
                                                : "",
                                            kind,

                                                ? prevConfirm.chunks.slice()

                                        && !content.startsWith("\n");

                                    const prevChunks = prev && typeof prev === "object" && Array.isArray(prev.chunks) ? prev.chunks : [];
                                    messageLines[messageLines.length - 1] = {

                                    specialShift: true
                                });
                                debugEvent("cmdline_show", { raw: a, level, text: chunksToText(a[0]) });
                                renderCmdline(level);
                            }
                            break;
                        }

                        case "cmdline_pos": {
                            for (const item of args) {
                                const a = normalizeArg(item);
                                const level = Number(a[1] ?? 1);
                                const state = cmdlines.get(level);
                                if (!state) continue;
                                state.pos = Number(a[0] ?? 0);
                                renderCmdline(level);
                            }
                            break;
                        }

                        case "cmdline_special_char": {
                            for (const item of args) {
                                const a = normalizeArg(item);
                                const level = Number(a[2] ?? 1);
                                const state = cmdlines.get(level);
                                if (!state) continue;
                                state.specialChar = String(a[0] ?? "");
                                state.specialShift = !!a[1];
                                renderCmdline(level);
                            }
                            break;
                        }

                        case "cmdline_hide": {
                            for (const item of args) {
                                const a = normalizeArg(item);
                                const level = Number(a[0] ?? 1);
                                const prev = cmdlines.get(level);
                                debugEvent("cmdline_hide", { raw: a, level });
                                cmdlines.delete(level);
                                if (prev && !prev.firstc && prev.prompt) {
                                    clearTransientMessageTimer();
                                    messageLines = [];
                                    msgShowmode = "";
                                    msgShowcmd = "";
                                    msgRuler = "";
                                }
                            }
                            renderCmdline();
                            refreshMessages();
                            break;
                        }

                        case "popupmenu_show": {
                            for (const item of args) {
                                const a = normalizeArg(item);
                                const items = Array.isArray(a[0]) ? a[0] : [];
                                popupmenuState = {
                                    items: items.map(entry => {
                                        const e = normalizeArg(entry);
                                        return {
                                            word: String(e[0] ?? ""),
                                            kind: String(e[1] ?? ""),
                                            menu: String(e[2] ?? ""),
                                            info: String(e[3] ?? "")
                                        };
                                    }),
                                    selected: Number(a[1] ?? -1),
                                    row: Number(a[2] ?? 0),
                                    col: Number(a[3] ?? 0),
                                    grid: Number(a[4] ?? 1)
                                };
                                debugEvent("popupmenu_show", {
                                    raw: a,
                                    selected: popupmenuState.selected,
                                    row: popupmenuState.row,
                                    col: popupmenuState.col,
                                    grid: popupmenuState.grid,
                                    items: popupmenuState.items.length
                                });
                            }
                            renderPopupmenu();
                            break;
                        }

                        case "popupmenu_select": {
                            for (const item of args) {
                                const a = normalizeArg(item);
                                if (popupmenuState) popupmenuState.selected = Number(a[0] ?? -1);
                                debugEvent("popupmenu_select", { selected: popupmenuState ? popupmenuState.selected : Number(a[0] ?? -1) });
                            }
                            renderPopupmenu();
                            break;
                        }

                        case "popupmenu_hide": {
                            popupmenuState = null;
                            if (activeMouseTarget && activeMouseTarget.popupmenu) {
                                activeMouseTarget = null;
                                mouseLeftDown = false;
                            }
                            debugEvent("popupmenu_hide", {});
                            renderPopupmenu();
                            break;
                        }

                        case "tabline_update": {
                            for (const item of args) {
                                const a = normalizeArg(item);
                                const current = stableKey(a[0]);
                                const tabs = Array.isArray(a[1]) ? a[1] : [];
                                const currentBuffer = stableKey(a[2]);
                                const buffers = Array.isArray(a[3]) ? a[3] : [];
                                const byBuf = new Map(buffers.map(buf => {
                                    const b = normalizeArg(buf);
                                    const entry = b[0] && typeof b[0] === "object" ? b[0] : null;
                                    const key = stableKey(entry?.buffer ?? b[0]);
                                    return [key, {
                                        name: String(entry?.name ?? b[1] ?? ""),
                                        changed: !!(entry?.changed ?? b[2])
                                    }];
                                }));

                                renderTabline({
                                    tabs: tabs.map((tab, index) => {
                                        const t = normalizeArg(tab);
                                        const entry = t[0] && typeof t[0] === "object" ? t[0] : null;
                                        const tabKey = stableKey(entry?.tab ?? t[0]);
                                        const explicitName = String(entry?.name ?? t[1] ?? "");
                                        const bufKey = tabKey === current ? currentBuffer : "";
                                        const info = byBuf.get(bufKey);
                                        return {
                                            index: index + 1,
                                            current: tabKey === current,
                                            changed: !!info?.changed,
                                            label: explicitName || info?.name || `tab ${index + 1}`
                                        };
                                    })
                                });
                            }
                            break;
                        }

                        case "cmdline_block_show": {
                            for (const item of args) {
                                const a = normalizeArg(item);
                                cmdlineBlock = Array.isArray(a[0])
                                    ? a[0].map(line => chunksToText(line))
                                    : [];
                            }
                            refreshCmdlineBlock();
                            break;
                        }

                        case "cmdline_block_append": {
                            for (const item of args) {
                                const a = normalizeArg(item);
                                cmdlineBlock.push(chunksToText(a[0]));
                            }
                            refreshCmdlineBlock();
                            break;
                        }

                        case "cmdline_block_hide": {
                            cmdlineBlock = [];
                            refreshCmdlineBlock();
                            break;
                        }

                        case "set_title": {
                            const t = String(args[0] ?? "Nvim");
                            post({ type: "title", title: t });
                            break;
                        }

                        case "mode_info_set": {
                            deferredPaintNeeded = true;
                            for (const item of args) {
                                const a = normalizeArg(item);
                                const enabled = !!a[0];
                                const infos = Array.isArray(a[1]) ? a[1] : [];
                                if (enabled) {
                                    modeInfos = infos;
                                    applyModeCursor(currentModeName);
                                    notifyImeOffIfNeeded(currentModeName);
                                }
                            }
                            break;
                        }

                        case "option_set": {
                            deferredPaintNeeded = true;
                            for (const item of args) {
                                const a = normalizeArg(item);
                                const optName = String(a[0] ?? "");
                                const optValue = a[1];
                                debugEvent("option_set", { name: optName, value: optValue });

                                if (optName === "guifont") {
                                    applyGuiFont(optValue);
                                }
                            }
                            break;
                        }

                        case "mode_change": {
                            deferredPaintNeeded = true;
                            for (const item of args) {
                                const a = normalizeArg(item);
                                const modeName = String(a[0] ?? currentModeName);
                                currentModeName = modeName;
                                if (modeName.startsWith("cmdline")) {
                                    msgShowcmd = "";
                                } else {
                                    if (cmdlines.size > 0) {
                                        cmdlines.clear();
                                    }
                                    if (cmdlineBlock.length > 0) {
                                        cmdlineBlock = [];
                                    }
                                    msgShowcmd = "";
                                }
                                debugEvent("mode_change", { raw: a, modeName });
                                applyModeCursor(modeName);
                                notifyImeOffIfNeeded(modeName);
                            }
                            renderCmdline();
                            refreshCmdlineBlock();
                            refreshMessages();
                            break;
                        }

                        case "busy_start": {
                            cursorVisible = false;
                            deferredPaintNeeded = true;
                            break;
                        }

                        case "busy_stop": {
                            cursorVisible = true;
                            deferredPaintNeeded = true;
                            break;
                        }

                        case "flush": {
                            debugEvent("flush", { paint: deferredPaintNeeded });
                            if (deferredPaintNeeded) {
                                markAllDirty();
                                schedulePaint();
                                deferredPaintNeeded = false;
                            }
                            if (popupmenuState) {
                                renderPopupmenu();
                            }
                            break;
                        }

                        default:
                            break;
                    }
                }
            }

            // --- input ---
            const SPECIAL = new Map([
                ["Enter", "<CR>"],
                ["Backspace", "<BS>"],
                ["Tab", "<Tab>"],
                ["Escape", "<Esc>"],
                ["ArrowLeft", "<Left>"],
                ["ArrowRight", "<Right>"],
                ["ArrowUp", "<Up>"],
                ["ArrowDown", "<Down>"],
                ["Home", "<Home>"],
                ["End", "<End>"],
                ["PageUp", "<PageUp>"],
                ["PageDown", "<PageDown>"],
                ["Delete", "<Del>"],
                ["Insert", "<Insert>"]
            ]);

            function keyToVim(e) {
                if (e.key.startsWith("F") && /^\d+$/.test(e.key.substring(1))) {
                    return { data: `<${e.key}>`, termcode: true };
                }

                if (SPECIAL.has(e.key)) {
                    if (e.key === "Tab" && e.shiftKey) {
                        return { data: "<S-Tab>", termcode: true };
                    }
                    return { data: SPECIAL.get(e.key), termcode: true };
                }

                if (e.ctrlKey && !e.altKey && e.key.length === 1) {
                    return { data: `<C-${e.key.toLowerCase()}>`, termcode: true };
                }

                if (e.altKey && !e.ctrlKey && e.key.length === 1) {
                    return { data: `<M-${e.key.toLowerCase()}>`, termcode: true };
                }

                if (!e.ctrlKey && !e.altKey && e.key.length === 1) {
                    return { data: e.key, termcode: false };
                }

                return null;
            }

            // クリックでIME用textareaにフォーカス
            root.addEventListener("pointerdown", (e) => {
                post({ type: "editorPointerDown" });

                if (e.button === 0) {
                    mouseLeftDown = true;
                    activeMouseTarget = postMouse("left", "press", e);
                } else if (e.button === 1) {
                    activeMouseTarget = postMouse("middle", "press", e);
                } else if (e.button === 2) {
                    activeMouseTarget = postMouse("right", "press", e);
                }

                setTimeout(() => {
                    syncImePosition();
                    ime.focus();
                }, 0);

                setTimeout(() => {
                    syncImePosition();
                    ime.focus();
                }, 150);

                e.preventDefault();
            }, { passive: false });

            root.addEventListener("pointerup", (e) => {
                if (e.button === 0) {
                    mouseLeftDown = false;
                    postMouse("left", "release", e, activeMouseTarget);
                } else if (e.button === 1) {
                    postMouse("middle", "release", e, activeMouseTarget);
                } else if (e.button === 2) {
                    postMouse("right", "release", e, activeMouseTarget);
                }
                activeMouseTarget = null;

                scheduleNvimRedraw();
                e.preventDefault();
            }, { passive: false });

            root.addEventListener("pointermove", (e) => {
                if (!mouseLeftDown) return;
                postMouse("left", "drag", e, activeMouseTarget);
                scheduleNvimRedraw();
                e.preventDefault();
            }, { passive: false });

            root.addEventListener("pointercancel", (e) => {
                if (!mouseLeftDown) return;
                mouseLeftDown = false;
                postMouse("left", "release", e, activeMouseTarget);
                activeMouseTarget = null;
                scheduleNvimRedraw();
            }, { passive: true });

            ime.addEventListener("compositionstart", () => {
                composing = true;
                suppressNextInputText = null;
                setImeComposingVisual(true);
                syncImePosition();
                schedulePaint();
            });

            ime.addEventListener("compositionupdate", () => {
                setImeComposingVisual(true);
                syncImePosition();
                schedulePaint();
            });

            ime.addEventListener("compositionend", (e) => {
                composing = false;
                setImeComposingVisual(false);

                const text = (e.data ?? ime.value ?? "");
                if (text) {
                    suppressNextInputText = text;
                    post({ type: "input", data: text, termcode: false });
                }

                ime.value = "";
                syncImePosition();
                schedulePaint();
            });

            ime.addEventListener("input", () => {
                if (composing) return;

                const v = ime.value || "";
                if (!v) {
                    ime.value = "";
                    syncImePosition();
                    schedulePaint();
                    return;
                }

                if (suppressNextInputText !== null && v === suppressNextInputText) {
                    suppressNextInputText = null;
                    ime.value = "";
                    syncImePosition();
                    schedulePaint();
                    return;
                }

                suppressNextInputText = null;
                post({ type: "input", data: v, termcode: false });
                ime.value = "";
                syncImePosition();
                schedulePaint();
            });

            ime.addEventListener("keydown", (e) => {
                if (composing || e.isComposing) return;

                const k = keyToVim(e);
                if (!k) return;

                e.preventDefault();
                e.stopPropagation();
                post({ type: "input", data: k.data, termcode: k.termcode });
            }, { passive: false });

            root.addEventListener("wheel", (e) => {
                e.preventDefault();

                if (Math.abs(e.deltaY) >= Math.abs(e.deltaX)) {
                    postMouse("wheel", e.deltaY < 0 ? "up" : "down", e);
                } else {
                    postMouse("wheel", e.deltaX < 0 ? "left" : "right", e);
                }

                scheduleNvimRedraw();
            }, { passive: false });

            popupmenuEl.addEventListener("pointerdown", (e) => {
                post({ type: "editorPointerDown" });
                if (e.button === 0) {
                    mouseLeftDown = true;
                    activeMouseTarget = postMouse("left", "press", e);
                } else if (e.button === 1) {
                    activeMouseTarget = postMouse("middle", "press", e);
                } else if (e.button === 2) {
                    activeMouseTarget = postMouse("right", "press", e);
                }
                e.preventDefault();
                e.stopPropagation();
            }, { passive: false });

            popupmenuEl.addEventListener("pointerup", (e) => {
                if (e.button === 0) {
                    mouseLeftDown = false;
                    postMouse("left", "release", e, activeMouseTarget);
                } else if (e.button === 1) {
                    postMouse("middle", "release", e, activeMouseTarget);
                } else if (e.button === 2) {
                    postMouse("right", "release", e, activeMouseTarget);
                }
                activeMouseTarget = null;
                scheduleNvimRedraw();
                e.preventDefault();
                e.stopPropagation();
            }, { passive: false });

            popupmenuEl.addEventListener("pointermove", (e) => {
                if (!mouseLeftDown) return;
                postMouse("left", "drag", e, activeMouseTarget);
                scheduleNvimRedraw();
                e.preventDefault();
                e.stopPropagation();
            }, { passive: false });

            popupmenuEl.addEventListener("wheel", (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (Math.abs(e.deltaY) >= Math.abs(e.deltaX)) {
                    postMouse("wheel", e.deltaY < 0 ? "up" : "down", e);
                } else {
                    postMouse("wheel", e.deltaX < 0 ? "left" : "right", e);
                }
                scheduleNvimRedraw();
            }, { passive: false });

            root.addEventListener("contextmenu", (e) => {
                e.preventDefault();
            }, { passive: false });

            function onResize() {
                updateMetrics();
                const cr = calcColsRows();
                if (cr.cols !== cols || cr.rows !== rows) {
                    allocGrid(cr.cols, cr.rows, 1);
                    post({ type: "resize", cols: cr.cols, rows: cr.rows });
                }
                schedulePaint();
            }

            // start
            updateMetrics();
            const cr = calcColsRows();
            allocGrid(cr.cols, cr.rows, 1);
            schedulePaint();
            post({ type: "ready", cols: cr.cols, rows: cr.rows });
            setTimeout(() => {
                syncImePosition();
                ime.focus();
            }, 0);

            try {
                new ResizeObserver(onResize).observe(root);
            } catch {
                window.addEventListener("resize", onResize);
            }

            window.addEventListener("error", (ev) => {
                reportUiRuntimeError("window.error", ev?.error || ev?.message || "unknown error");
            });

            window.addEventListener("unhandledrejection", (ev) => {
                reportUiRuntimeError("window.unhandledrejection", ev?.reason || "unknown rejection");
            });

            window.chrome.webview.addEventListener("message", (ev) => {
                let msg;
                try {
                    msg = JSON.parse(ev.data);
                } catch {
                    return;
                }

                if (msg.type === "bootError" && msg.message) {
                    showErr(String(msg.message));
                    return;
                }

                if (msg.type === "config") {
                    setUiDebugEnabled(!!msg.uiDebugEnabled);
                    return;
                }

                if (msg.type === "redrawBatch" && Array.isArray(msg.batches)) {
                    try {
                        const merged = [];
                        for (const evs of msg.batches) {
                            if (Array.isArray(evs)) {
                                for (const ev of evs) merged.push(ev);
                            }
                        }
                        applyRedraw(merged);
                    } catch (e) {
                        showErr("applyRedraw failed: " + e + "\n" + (e && e.stack ? e.stack : ""));
                    }
                    return;
                }

                if (msg.type === "redraw" && msg.events) {
                    try {
                        applyRedraw(msg.events);
                    } catch (e) {
                        showErr("applyRedraw failed: " + e + "\n" + (e && e.stack ? e.stack : ""));
                    }
                }
            });
        })();
    </script>
</body>
</html>
